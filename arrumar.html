<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arrumar">
<meta name="theme-color" content="#4FC3F7">
<title>🛁 Hora de Arrumar!</title>
<style>
:root {
  --sky:    #4FC3F7;
  --sunny:  #FFD740;
  --grass:  #66BB6A;
  --pink:   #F48FB1;
  --purple: #CE93D8;
  --peach:  #FFCC80;
  --ink:    #37474F;
  --white:  #FFFFFF;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #E3F2FD; font-family: 'Helvetica Neue', Arial, sans-serif; }

/* ══ LAYOUT ══════════════════════════════════════════════ */
#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
}

/* ══ PROGRESS BAR ════════════════════════════════════════ */
#progress-bar {
  background: rgba(255,255,255,.6);
  padding: 8px 14px 6px;
  padding-top: calc(8px + var(--safe-top));
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
  z-index: 10;
}
.star-track { display: flex; gap: 4px; flex: 1; }
.star { font-size: 1.6rem; transition: transform .3s; filter: grayscale(1) opacity(.3); }
.star.lit { filter: none; transform: scale(1.2); }
.star.pop { animation: starPop .4s; }
@keyframes starPop { 0%,100%{transform:scale(1.2)} 50%{transform:scale(1.8)} }

/* ══ SCENE ═══════════════════════════════════════════════ */
#scene {
  flex: 1; position: relative; overflow: hidden;
  background: linear-gradient(180deg, #B3E5FC 0%, #E1F5FE 55%, #C8E6C9 55%, #A5D6A7 100%);
}

/* house */
#house-svg { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; }

/* character */
#char-wrap {
  position: absolute;
  bottom: 22%;
  left: 50%; transform: translateX(-50%);
  width: min(42vw, 180px);
  transition: bottom .4s;
}
#char-svg { width: 100%; height: auto; display: block; }

/* dirt overlays on character */
.char-dirt { transition: opacity .5s; }

/* bubbles */
.bubble {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(135,206,235,.4));
  border: 2px solid rgba(255,255,255,.7);
  pointer-events: none;
  animation: bubbleFloat linear forwards;
}
@keyframes bubbleFloat {
  0%   { opacity:.9; transform: translateY(0) scale(1); }
  100% { opacity:0;  transform: translateY(-120px) scale(.4); }
}

/* sparkle */
.sparkle {
  position: absolute; font-size: 1.4rem; pointer-events: none;
  animation: sparklePop .6s ease-out forwards;
}
@keyframes sparklePop {
  0%   { opacity:1; transform: scale(0) rotate(0deg); }
  60%  { opacity:1; transform: scale(1.4) rotate(20deg); }
  100% { opacity:0; transform: scale(1) rotate(40deg) translateY(-30px); }
}

/* water splash on char */
.splash {
  position: absolute; font-size: 2rem; pointer-events: none;
  animation: splashAnim .5s ease-out forwards;
}
@keyframes splashAnim {
  0%   { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-50px) scale(1.5); }
}

/* house dirt patches */
.hdirt { transition: opacity .6s; }

/* ══ PHASE PANEL ═════════════════════════════════════════ */
#phase-panel {
  flex-shrink: 0;
  background: #fff;
  border-top: 4px solid #e0e0e0;
  padding: 10px 10px;
  padding-bottom: calc(10px + var(--safe-bottom));
  display: flex; flex-direction: column; gap: 8px;
  z-index: 10;
}

/* phase title row */
#phase-title { font-size: 1.8rem; text-align: center; line-height: 1; }

/* action buttons grid */
#action-grid {
  display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
}
.action-btn {
  background: linear-gradient(145deg, #fff 0%, #f5f5f5 100%);
  border: 3px solid #e0e0e0;
  border-radius: 20px;
  padding: 10px 14px;
  font-size: 2.2rem;
  cursor: pointer;
  transition: transform .1s, box-shadow .1s, border-color .1s;
  box-shadow: 0 4px 0 #d0d0d0;
  min-width: 70px; min-height: 70px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  -webkit-user-select: none; user-select: none;
}
.action-btn:active { transform: scale(.88) translateY(3px); box-shadow: 0 1px 0 #d0d0d0; }
.action-btn.done { border-color: #66BB6A; background: linear-gradient(145deg, #f1f8f1, #e8f5e9); box-shadow: 0 4px 0 #4caf50; }
.action-btn.selected { border-color: var(--sky); background: linear-gradient(145deg, #e3f2fd, #bbdefb); box-shadow: 0 4px 0 #29b6f6; }
.action-btn .check { position:absolute; top:-6px; right:-6px; font-size:1rem; background:#66BB6A; color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }

/* next phase btn */
#next-btn {
  background: linear-gradient(135deg, #66BB6A, #43A047);
  border: none; border-radius: 50px;
  padding: 12px 28px; font-size: 2rem;
  cursor: pointer; color: #fff; font-weight: 900;
  box-shadow: 0 5px 0 #2E7D32;
  transition: transform .1s, box-shadow .1s;
  display: none; align-self: center;
}
#next-btn.show { display: block; animation: bounceIn .4s; }
@keyframes bounceIn { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
#next-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #2E7D32; }

/* ══ CELEBRATION ═════════════════════════════════════════ */
#celebration {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px;
  background: rgba(255,253,231,.95);
  opacity: 0; pointer-events: none;
  transition: opacity .5s;
}
#celebration.show { opacity: 1; pointer-events: auto; }
#celeb-char { font-size: 8rem; animation: dance 1s infinite alternate; }
@keyframes dance { 0%{transform:rotate(-8deg) scale(1)} 100%{transform:rotate(8deg) scale(1.08)} }
#celeb-stars { font-size: 2.5rem; letter-spacing: 6px; }
#play-again {
  background: linear-gradient(135deg, #FF7043, #F4511E);
  border: none; border-radius: 50px;
  padding: 16px 36px; font-size: 2.5rem;
  cursor: pointer; color: #fff;
  box-shadow: 0 6px 0 #BF360C;
  transition: transform .1s, box-shadow .1s;
}
#play-again:active { transform: translateY(4px); box-shadow: 0 2px 0 #BF360C; }
.confetti-piece { position:fixed; width:12px; height:12px; border-radius:2px; pointer-events:none; z-index:300; animation:cfall linear forwards; }
@keyframes cfall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }

/* ══ PHASE TRANSITION FLASH ══════════════════════════════ */
#flash {
  position: fixed; inset: 0; z-index: 190;
  background: #fff; opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
#flash.on { opacity: .7; }
</style>
</head>
<body>
<div id="app">

  <!-- PROGRESS -->
  <div id="progress-bar">
    <div class="star-track" id="star-track"></div>
  </div>

  <!-- SCENE -->
  <div id="scene">

    <!-- HOUSE SVG (background walls, window, floor, dirt) -->
    <svg id="house-svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <!-- sky done by CSS gradient -->

      <!-- floor / wall -->
      <rect x="0" y="300" width="400" height="200" fill="#A5D6A7"/>
      <rect x="20" y="220" width="360" height="220" rx="8" fill="#FFF8E7" stroke="#E0CC99" stroke-width="3"/>

      <!-- window -->
      <rect x="40" y="245" width="90" height="70" rx="8" fill="#B3E5FC" stroke="#90CAF9" stroke-width="3"/>
      <line x1="85" y1="245" x2="85" y2="315" stroke="#90CAF9" stroke-width="2"/>
      <line x1="40" y1="280" x2="130" y2="280" stroke="#90CAF9" stroke-width="2"/>
      <!-- window curtain -->
      <path d="M40,245 Q52,265 40,285" fill="#F48FB1" opacity=".7"/>
      <path d="M130,245 Q118,265 130,285" fill="#F48FB1" opacity=".7"/>

      <!-- picture on wall -->
      <rect x="260" y="240" width="70" height="55" rx="5" fill="#FFF" stroke="#BDBDBD" stroke-width="2"/>
      <circle cx="295" cy="262" r="12" fill="#FFD740"/>
      <path d="M265,290 Q280,270 295,278 Q310,285 325,268 L325,292 Z" fill="#66BB6A"/>

      <!-- shelf -->
      <rect x="155" y="252" width="80" height="8" rx="4" fill="#D7CCC8"/>
      <rect x="163" y="235" width="14" height="18" rx="3" fill="#EF9A9A"/>
      <rect x="182" y="238" width="10" height="15" rx="2" fill="#80CBC4"/>
      <rect x="197" y="233" width="12" height="20" rx="3" fill="#FFD54F"/>
      <rect x="213" y="240" width="8"  height="13" rx="2" fill="#CE93D8"/>

      <!-- floor line -->
      <rect x="20" y="415" width="360" height="6" rx="3" fill="#C8E6C9"/>

      <!-- toy on floor (initially messy) -->
      <g id="toy-block" transform="translate(50,390)">
        <rect width="28" height="28" rx="5" fill="#EF9A9A" transform="rotate(-20)"/>
        <rect x="20" y="5" width="22" height="22" rx="4" fill="#80CBC4" transform="rotate(10)"/>
        <rect x="-15" y="18" width="20" height="20" rx="4" fill="#FFD54F" transform="rotate(-5)"/>
      </g>

      <!-- sock on floor -->
      <g id="sock">
        <path d="M300,410 Q310,405 325,408 Q335,415 330,422 Q320,425 308,418 Z" fill="#F48FB1" transform="rotate(15,315,415)"/>
      </g>

      <!-- HOUSE DIRT patches -->
      <g id="house-dirt">
        <!-- window smudge -->
        <ellipse class="hdirt" id="hd1" cx="70" cy="270" rx="18" ry="12" fill="#8D6E63" opacity=".35"/>
        <ellipse class="hdirt" id="hd2" cx="100" cy="290" rx="10" ry="7" fill="#8D6E63" opacity=".3"/>
        <!-- wall splat 1 -->
        <circle class="hdirt" id="hd3" cx="200" cy="300" r="14" fill="#8D6E63" opacity=".25"/>
        <circle class="hdirt" id="hd4" cx="215" cy="310" r="8"  fill="#8D6E63" opacity=".2"/>
        <!-- floor mud -->
        <ellipse class="hdirt" id="hd5" cx="160" cy="420" rx="30" ry="10" fill="#6D4C41" opacity=".35"/>
        <ellipse class="hdirt" id="hd6" cx="330" cy="430" rx="22" ry="8"  fill="#6D4C41" opacity=".3"/>
        <!-- dust bunnies -->
        <ellipse class="hdirt" id="hd7" cx="90"  cy="432" rx="15" ry="6"  fill="#9E9E9E" opacity=".35"/>
        <ellipse class="hdirt" id="hd8" cx="350" cy="395" rx="12" ry="5"  fill="#9E9E9E" opacity=".3"/>
      </g>
    </svg>

    <!-- CHARACTER -->
    <div id="char-wrap">
      <svg id="char-svg" viewBox="0 0 160 280" xmlns="http://www.w3.org/2000/svg">

        <!-- BODY / CLOTHES — coloured by JS -->
        <g id="char-body">
          <!-- legs -->
          <rect id="leg-l" x="42" y="195" width="28" height="70" rx="12" fill="#FFCC80"/>
          <rect id="leg-r" x="90" y="195" width="28" height="70" rx="12" fill="#FFCC80"/>
          <!-- shoes -->
          <ellipse id="shoe-l" cx="56"  cy="265" rx="18" ry="10" fill="#757575"/>
          <ellipse id="shoe-r" cx="104" cy="265" rx="18" ry="10" fill="#757575"/>
          <!-- torso -->
          <rect id="torso" x="30" y="130" width="100" height="75" rx="20" fill="#EF9A9A"/>
          <!-- arms -->
          <rect id="arm-l" x="4"  y="135" width="28" height="55" rx="12" fill="#FFCC80"/>
          <rect id="arm-r" x="128" y="135" width="28" height="55" rx="12" fill="#FFCC80"/>
          <!-- hands -->
          <circle id="hand-l" cx="18"  cy="193" r="13" fill="#FFCC80"/>
          <circle id="hand-r" cx="142" cy="193" r="13" fill="#FFCC80"/>
          <!-- neck -->
          <rect x="62" y="115" width="36" height="22" rx="8" fill="#FFCC80"/>
          <!-- head -->
          <ellipse id="head" cx="80" cy="88" rx="50" ry="52" fill="#FFCC80"/>
          <!-- ears -->
          <ellipse cx="31" cy="90" rx="11" ry="13" fill="#FFCC80"/>
          <ellipse cx="129" cy="90" rx="11" ry="13" fill="#FFCC80"/>
        </g>

        <!-- FACE -->
        <g id="char-face">
          <!-- eyes -->
          <ellipse cx="62" cy="82" rx="9" ry="10" fill="#fff"/>
          <circle  cx="64" cy="83" r="5"  fill="#5D4037"/>
          <circle  cx="65" cy="81" r="2"  fill="#fff"/>
          <ellipse cx="98" cy="82" rx="9" ry="10" fill="#fff"/>
          <circle  cx="100" cy="83" r="5" fill="#5D4037"/>
          <circle  cx="101" cy="81" r="2" fill="#fff"/>
          <!-- brows (sad when dirty) -->
          <path id="brow-l" d="M54,68 Q63,65 70,68" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path id="brow-r" d="M90,68 Q97,65 106,68" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- mouth (sad) -->
          <path id="mouth" d="M65,108 Q80,102 95,108" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- cheeks -->
          <ellipse id="cheek-l" cx="45" cy="100" rx="12" ry="8" fill="#F48FB1" opacity="0"/>
          <ellipse id="cheek-r" cx="115" cy="100" rx="12" ry="8" fill="#F48FB1" opacity="0"/>
          <!-- nose -->
          <ellipse cx="80" cy="96" rx="6" ry="4" fill="#FFAB91"/>
        </g>

        <!-- HAIR — swapped by JS (default: messy dirty) -->
        <g id="char-hair">
          <!-- messy base -->
          <ellipse id="hair-base" cx="80" cy="68" rx="52" ry="38" fill="#5D4037"/>
          <path id="hair-extra" d="M30,55 Q20,30 45,25 Q55,50 30,55Z M130,55 Q140,30 115,25 Q105,50 130,55Z M80,35 Q70,10 95,15 Q90,40 80,35Z" fill="#5D4037"/>
          <!-- messy strands -->
          <path id="hair-messy" d="M28,70 Q15,50 30,35 M132,70 Q145,50 130,35 M60,33 Q50,10 70,18 M100,33 Q110,10 90,18" stroke="#5D4037" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/>
        </g>

        <!-- HAIR ACCESSORY (bow, tiara, etc) — set by JS -->
        <g id="hair-acc"></g>

        <!-- CHARACTER DIRT -->
        <g id="char-dirt">
          <ellipse class="char-dirt" id="cd1" cx="55"  cy="95" rx="12" ry="8"  fill="#6D4C41" opacity=".55"/>
          <ellipse class="char-dirt" id="cd2" cx="100" cy="70" rx="9"  ry="6"  fill="#6D4C41" opacity=".5"/>
          <circle  class="char-dirt" id="cd3" cx="75"  cy="160" r="10" fill="#6D4C41" opacity=".45"/>
          <ellipse class="char-dirt" id="cd4" cx="115" cy="155" rx="8" ry="5"  fill="#6D4C41" opacity=".4"/>
          <ellipse class="char-dirt" id="cd5" cx="40"  cy="180" rx="7" ry="4"  fill="#8D6E63" opacity=".4"/>
          <ellipse class="char-dirt" id="cd6" cx="120" cy="220" rx="9" ry="5"  fill="#6D4C41" opacity=".45"/>
          <!-- face grime -->
          <ellipse class="char-dirt" id="cd7" cx="70" cy="100" rx="7" ry="5" fill="#8D6E63" opacity=".4"/>
          <circle  class="char-dirt" id="cd8" cx="95" cy="88"  r="5"          fill="#8D6E63" opacity=".35"/>
        </g>

        <!-- TOWEL (shown during bath phase) -->
        <g id="towel" opacity="0">
          <rect x="20" y="118" width="120" height="18" rx="9" fill="#80CBC4"/>
          <rect x="60" y="105" width="40" height="20" rx="8" fill="#80CBC4"/>
        </g>

      </svg>
    </div>

  </div><!-- /scene -->

  <!-- PHASE PANEL -->
  <div id="phase-panel">
    <div id="phase-title">🛁</div>
    <div id="action-grid"></div>
    <button id="next-btn" onclick="nextPhase()">➡️</button>
  </div>

</div><!-- /app -->

<!-- CELEBRATION -->
<div id="celebration">
  <div id="celeb-char">✨</div>
  <div id="celeb-stars">⭐⭐⭐⭐⭐</div>
  <button id="play-again" onclick="resetGame()">🔄</button>
</div>

<div id="flash"></div>

<script>
// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
const TOTAL_STARS = 10;
let stars = 0;
let phase = 0; // 0=bath 1=hair 2=clothes 3=house 4=done

// Tracking what's been done in each phase
const done = { bath:0, hair:false, clothes:false, house:0 };

// Hair styles: [svgContent, accessoryContent, label-emoji]
const HAIR_STYLES = [
  {
    id:'ponytail',
    base: `<ellipse cx="80" cy="68" rx="52" ry="36" fill="#5D4037"/>
           <ellipse cx="80" cy="45" rx="44" ry="28" fill="#5D4037"/>`,
    extra:`<ellipse cx="80" cy="32" rx="10" ry="20" fill="#5D4037"/>
           <ellipse cx="80" cy="52" rx="8" ry="8" fill="#795548"/>`,
    acc:  `<ellipse cx="80" cy="30" rx="14" ry="8" fill="#F06292"/>
           <circle cx="80" cy="30" r="5" fill="#E91E63"/>`,
    messy:'',
    emoji:'🎀'
  },
  {
    id:'curls',
    base: `<ellipse cx="80" cy="68" rx="52" ry="38" fill="#5D4037"/>`,
    extra:`<path d="M30,60 Q18,42 32,30 Q46,42 30,60Z M130,60 Q142,42 128,30 Q114,42 130,60Z
                   M55,32 Q50,10 68,18 Q65,35 55,32Z M105,32 Q110,10 92,18 Q95,35 105,32Z
                   M80,28 Q72,8 90,12 Q88,30 80,28Z" fill="#4E342E"/>`,
    acc:  `<circle cx="50" cy="58" r="7" fill="#CE93D8"/>
           <circle cx="110" cy="58" r="7" fill="#CE93D8"/>`,
    messy:'',
    emoji:'🌀'
  },
  {
    id:'buns',
    base: `<ellipse cx="80" cy="75" rx="48" ry="32" fill="#5D4037"/>`,
    extra:`<circle cx="45" cy="45" r="22" fill="#5D4037"/>
           <circle cx="115" cy="45" r="22" fill="#5D4037"/>`,
    acc:  `<circle cx="45" cy="45" r="10" fill="#FFD740" opacity=".7"/>
           <circle cx="115" cy="45" r="10" fill="#FFD740" opacity=".7"/>`,
    messy:'',
    emoji:'🌟'
  },
  {
    id:'straight',
    base: `<ellipse cx="80" cy="65" rx="52" ry="36" fill="#5D4037"/>
           <rect x="28" y="65" width="20" height="55" rx="10" fill="#5D4037"/>
           <rect x="112" y="65" width="20" height="55" rx="10" fill="#5D4037"/>`,
    extra:`<rect x="38" y="30" width="84" height="16" rx="8" fill="#4E342E"/>`,
    acc:  `<rect x="55" y="35" width="50" height="10" rx="5" fill="#4FC3F7"/>
           <circle cx="55" cy="40" r="6" fill="#0288D1"/>
           <circle cx="105" cy="40" r="6" fill="#0288D1"/>`,
    messy:'',
    emoji:'💧'
  },
];

// Clothes: [torso color, shoe color, emoji]
const CLOTHES = [
  { torso:'#EF9A9A', shoe:'#757575', emoji:'❤️' },
  { torso:'#80CBC4', shoe:'#4CAF50', emoji:'💚' },
  { torso:'#CE93D8', shoe:'#9C27B0', emoji:'💜' },
  { torso:'#FFD54F', shoe:'#FF9800', emoji:'⭐' },
  { torso:'#80DEEA', shoe:'#00BCD4', emoji:'💙' },
  { torso:'#FFAB91', shoe:'#FF5722', emoji:'🧡' },
];

let selectedHair    = null;
let selectedClothes = null;

// ══════════════════════════════════════════════════════════
// STAR PROGRESS
// ══════════════════════════════════════════════════════════
function buildStars() {
  const track = document.getElementById('star-track');
  track.innerHTML = '';
  for (let i = 0; i < TOTAL_STARS; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.id = `star${i}`;
    s.textContent = '⭐';
    track.appendChild(s);
  }
}

function addStar(n = 1) {
  for (let i = 0; i < n; i++) {
    if (stars >= TOTAL_STARS) break;
    const el = document.getElementById(`star${stars}`);
    el.classList.add('lit', 'pop');
    setTimeout(() => el.classList.remove('pop'), 400);
    stars++;
  }
  checkComplete();
}

function checkComplete() {
  if (stars >= TOTAL_STARS && phase === 3) {
    setTimeout(celebrate, 600);
  }
}

// ══════════════════════════════════════════════════════════
// PHASES
// ══════════════════════════════════════════════════════════
const PHASES = [
  { title: '🛁', render: renderBathPhase },
  { title: '💇', render: renderHairPhase },
  { title: '👗', render: renderClothesPhase },
  { title: '🏠', render: renderHousePhase },
];

function renderPhase() {
  document.getElementById('phase-title').textContent = PHASES[phase].title;
  document.getElementById('next-btn').classList.remove('show');
  PHASES[phase].render();
}

function nextPhase() {
  flash();
  setTimeout(() => {
    phase++;
    if (phase < PHASES.length) renderPhase();
  }, 200);
}

function flash() {
  const el = document.getElementById('flash');
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 200);
}

// ──── PHASE 0: BATH ───────────────────────────────────────
const BATH_STEPS = ['🚿','🧼','🪥','🧽'];
let bathDone = [false, false, false, false];

function renderBathPhase() {
  const grid = document.getElementById('action-grid');
  grid.innerHTML = BATH_STEPS.map((e, i) => `
    <button class="action-btn ${bathDone[i]?'done':''}" id="bath${i}" onclick="doBath(${i})">
      ${e}
      ${bathDone[i] ? '<span class="check">✓</span>' : ''}
    </button>`).join('');
}

function doBath(i) {
  if (bathDone[i]) return;
  bathDone[i] = true;

  // remove one dirt patch per step
  const dirtIds = ['cd1','cd2','cd3,cd4','cd5,cd6','cd7','cd8'];
  const toClean = [['cd1','cd2'],['cd3','cd4'],['cd5','cd6'],['cd7','cd8']];
  toClean[i].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = '0';
  });

  // show towel on last step
  if (bathDone.every(Boolean)) {
    document.getElementById('towel').style.opacity = '1';
    setTimeout(() => document.getElementById('towel').style.opacity = '0', 1200);
    setFaceHappy(true);
  }

  // bubbles animation
  spawnBubbles();
  addStar(bathDone.filter(Boolean).length === 1 ? 1 : bathDone.every(Boolean) ? 2 : 1);
  renderBathPhase();
  checkBathPhase();
}

function checkBathPhase() {
  if (bathDone.every(Boolean)) {
    setTimeout(() => document.getElementById('next-btn').classList.add('show'), 400);
  }
}

function spawnBubbles() {
  const scene = document.getElementById('scene');
  const charWrap = document.getElementById('char-wrap');
  const rect = charWrap.getBoundingClientRect();
  const sceneRect = scene.getBoundingClientRect();
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 12 + Math.random() * 20;
    b.style.width  = size + 'px';
    b.style.height = size + 'px';
    b.style.left = (rect.left - sceneRect.left + Math.random() * rect.width) + 'px';
    b.style.top  = (rect.top  - sceneRect.top  + Math.random() * rect.height * .5 + rect.height * .3) + 'px';
    b.style.animationDuration = (.8 + Math.random() * .8) + 's';
    b.style.animationDelay   = (Math.random() * .4) + 's';
    scene.appendChild(b);
    setTimeout(() => b.remove(), 2000);
  }
}

// ──── PHASE 1: HAIR ───────────────────────────────────────
function renderHairPhase() {
  const grid = document.getElementById('action-grid');
  grid.innerHTML = HAIR_STYLES.map((h, i) => `
    <button class="action-btn ${selectedHair===i?'selected':''}" onclick="doHair(${i})">
      ${h.emoji}
    </button>`).join('');
}

function doHair(i) {
  selectedHair = i;
  const h = HAIR_STYLES[i];

  // Update SVG hair
  document.getElementById('hair-base').setAttribute('d', '');
  document.querySelector('#char-hair #hair-base').outerHTML;

  // Rebuild hair group
  const hairG = document.getElementById('char-hair');
  hairG.innerHTML = `
    <g id="hair-inner">
      ${h.base}
      ${h.extra}
    </g>
  `;
  hairG.id = 'char-hair';

  // Accessory
  document.getElementById('hair-acc').innerHTML = h.acc;

  // Sparkles
  spawnSparkles();

  if (!done.hair) { done.hair = true; addStar(2); }
  renderHairPhase();
  document.getElementById('next-btn').classList.add('show');
}

function spawnSparkles() {
  const scene = document.getElementById('scene');
  const charWrap = document.getElementById('char-wrap');
  const rect = charWrap.getBoundingClientRect();
  const sceneRect = scene.getBoundingClientRect();
  ['✨','⭐','💫','🌟'].forEach((s, idx) => {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = s;
    el.style.left = (rect.left - sceneRect.left + 20 + idx * 35) + 'px';
    el.style.top  = (rect.top  - sceneRect.top  + 10 + (idx%2)*30) + 'px';
    el.style.animationDelay = (idx * .1) + 's';
    scene.appendChild(el);
    setTimeout(() => el.remove(), 800);
  });
}

// ──── PHASE 2: CLOTHES ────────────────────────────────────
function renderClothesPhase() {
  const grid = document.getElementById('action-grid');
  grid.innerHTML = CLOTHES.map((c, i) => `
    <button class="action-btn ${selectedClothes===i?'selected':''}" onclick="doClothes(${i})">
      ${c.emoji}
    </button>`).join('');
}

function doClothes(i) {
  selectedClothes = i;
  const c = CLOTHES[i];

  // Recolour torso + arms
  document.getElementById('torso').setAttribute('fill', c.torso);
  // Arms slightly darker version
  document.getElementById('arm-l').setAttribute('fill', c.torso);
  document.getElementById('arm-r').setAttribute('fill', c.torso);
  // Shoes
  document.getElementById('shoe-l').setAttribute('fill', c.shoe);
  document.getElementById('shoe-r').setAttribute('fill', c.shoe);

  spawnSparkles();

  if (!done.clothes) { done.clothes = true; addStar(2); }
  renderClothesPhase();
  document.getElementById('next-btn').classList.add('show');
}

// ──── PHASE 3: HOUSE ──────────────────────────────────────
const HOUSE_STEPS = [
  { emoji:'🪟', ids:['hd1','hd2'] },   // clean window
  { emoji:'🧹', ids:['hd5','hd6','hd7','hd8'] }, // sweep floor
  { emoji:'🧺', ids:['sock'] },         // pick up sock → hide
  { emoji:'🧸', ids:['toy-block'] },    // tidy toys → hide
  { emoji:'🖼️', ids:['hd3','hd4'] },   // clean wall
];
let houseDone = HOUSE_STEPS.map(() => false);

function renderHousePhase() {
  const grid = document.getElementById('action-grid');
  grid.innerHTML = HOUSE_STEPS.map((s, i) => `
    <button class="action-btn ${houseDone[i]?'done':''}" id="house${i}" onclick="doHouse(${i})">
      ${s.emoji}
      ${houseDone[i] ? '<span class="check">✓</span>' : ''}
    </button>`).join('');
}

function doHouse(i) {
  if (houseDone[i]) return;
  houseDone[i] = true;
  const step = HOUSE_STEPS[i];

  step.ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.style.transition = 'opacity .5s';
      el.style.opacity = '0';
    }
  });

  // sparkle on scene
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();
  ['✨','🌟'].forEach((s, idx) => {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = s;
    el.style.left = (50 + Math.random() * (sceneRect.width - 100)) + 'px';
    el.style.top  = (50 + Math.random() * (sceneRect.height - 100)) + 'px';
    el.style.animationDelay = (idx * .15) + 's';
    scene.appendChild(el);
    setTimeout(() => el.remove(), 800);
  });

  addStar(1);
  renderHousePhase();

  if (houseDone.every(Boolean)) {
    setTimeout(() => {
      document.getElementById('next-btn').classList.add('show');
      // trick: next-btn will trigger celebration
      document.getElementById('next-btn').onclick = celebrate;
    }, 400);
  }
}

// ──── HAPPY FACE ──────────────────────────────────────────
function setFaceHappy(happy) {
  const mouth = document.getElementById('mouth');
  const browL  = document.getElementById('brow-l');
  const browR  = document.getElementById('brow-r');
  const cheekL = document.getElementById('cheek-l');
  const cheekR = document.getElementById('cheek-r');

  if (happy) {
    mouth.setAttribute('d', 'M65,105 Q80,118 95,105');
    browL.setAttribute('d', 'M54,70 Q63,66 70,70');
    browR.setAttribute('d', 'M90,70 Q97,66 106,70');
    cheekL.style.opacity = '.45';
    cheekR.style.opacity = '.45';
  } else {
    mouth.setAttribute('d', 'M65,108 Q80,102 95,108');
    browL.setAttribute('d', 'M54,68 Q63,65 70,68');
    browR.setAttribute('d', 'M90,68 Q97,65 106,68');
    cheekL.style.opacity = '0';
    cheekR.style.opacity = '0';
  }
}

// ══════════════════════════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════════════════════════
function celebrate() {
  // Make character fully happy
  setFaceHappy(true);
  document.getElementById('celebration').classList.add('show');
  launchConfetti();

  // Pick a fun emoji for the character
  const celebEmojis = ['🧒','👧','🌟','😊'];
  document.getElementById('celeb-char').textContent = '✨👧✨';
}

function launchConfetti() {
  const cols = ['#FF5757','#FFB800','#4CAF50','#2196F3','#F48FB1','#CE93D8','#FFD740'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = cols[Math.floor(Math.random() * cols.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay    = (Math.random() * .8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ══════════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════════
function resetGame() {
  // hide celebration
  document.getElementById('celebration').classList.remove('show');

  // reset state
  stars = 0; phase = 0;
  bathDone    = [false,false,false,false];
  houseDone   = HOUSE_STEPS.map(() => false);
  done.hair   = false;
  done.clothes = false;
  selectedHair = null;
  selectedClothes = null;

  // reset stars
  document.querySelectorAll('.star').forEach(s => s.classList.remove('lit','pop'));

  // reset dirt
  document.querySelectorAll('.char-dirt, .hdirt').forEach(el => el.style.opacity = '');
  ['sock','toy-block'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = '';
  });

  // reset face
  setFaceHappy(false);

  // reset hair
  document.getElementById('char-hair').innerHTML = `
    <ellipse id="hair-base" cx="80" cy="68" rx="52" ry="38" fill="#5D4037"/>
    <path id="hair-extra" d="M30,55 Q20,30 45,25 Q55,50 30,55Z M130,55 Q140,30 115,25 Q105,50 130,55Z M80,35 Q70,10 95,15 Q90,40 80,35Z" fill="#5D4037"/>
    <path id="hair-messy" d="M28,70 Q15,50 30,35 M132,70 Q145,50 130,35 M60,33 Q50,10 70,18 M100,33 Q110,10 90,18" stroke="#5D4037" stroke-width="5" fill="none" stroke-linecap="round" opacity="1"/>
  `;
  document.getElementById('hair-acc').innerHTML = '';

  // reset clothes
  document.getElementById('torso').setAttribute('fill','#EF9A9A');
  document.getElementById('arm-l').setAttribute('fill','#EF9A9A');
  document.getElementById('arm-r').setAttribute('fill','#EF9A9A');
  document.getElementById('shoe-l').setAttribute('fill','#757575');
  document.getElementById('shoe-r').setAttribute('fill','#757575');

  // reset next button
  document.getElementById('next-btn').onclick = nextPhase;
  document.getElementById('next-btn').classList.remove('show');

  flash();
  setTimeout(renderPhase, 200);
}
