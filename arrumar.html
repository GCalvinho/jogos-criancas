<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Princesa">
<meta name="theme-color" content="#C77DFF">
<title>👸 Princesa</title>
<style>
:root{
  --rose:#F48FB1; --lilac:#C77DFF; --gold:#FFD700; --sky:#B3E5FC;
  --mint:#80DEEA; --cream:#FFF8E7; --ink:#4A235A;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;width:100%;overflow:hidden;background:#1a0a2e;font-family:'Helvetica Neue',Arial,sans-serif;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;background:linear-gradient(180deg,#1a0a2e 0%,#2d1b4e 100%);}

/* ── STARS BG ── */
#stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star-dot{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

/* ── PROGRESS ── */
#topbar{
  position:relative;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  padding-top:calc(8px + var(--safe-top));
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(8px);
  flex-shrink:0;
}
.star-pip{font-size:1.3rem;transition:transform .3s,filter .3s;filter:grayscale(1) opacity(.25);}
.star-pip.lit{filter:none;transform:scale(1.2);}
.star-pip.pop{animation:sPop .4s;}
@keyframes sPop{0%,100%{transform:scale(1.2)}50%{transform:scale(2)}}
#phase-indicator{margin-left:auto;font-size:1.5rem;display:flex;gap:4px;}
.phase-dot{font-size:1.1rem;filter:grayscale(1) opacity(.3);transition:filter .3s;}
.phase-dot.active{filter:none;}

/* ── SCENE ── */
#scene{
  position:relative;z-index:1;
  flex:1;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
}

/* room background */
#room-bg{position:absolute;inset:0;width:100%;height:100%;}

/* princess container — centred, sized proportionally */
#princess-wrap{
  position:absolute;
  bottom:0;
  left:50%;transform:translateX(-50%);
  width:min(55vw,220px);
  z-index:5;
}
#princess-svg{width:100%;height:auto;display:block;overflow:visible;}

/* dirt canvas sits exactly on top of princess */
#dirt-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  z-index:6;
  border-radius:4px;
  touch-action:none;
  cursor:crosshair;
}

/* bubbles */
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.95),rgba(150,220,255,.3));border:1.5px solid rgba(255,255,255,.8);pointer-events:none;animation:bFloat linear forwards;z-index:20;}
@keyframes bFloat{0%{opacity:.9;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-160px) scale(.3)}}

/* sparkles */
.sparkle-el{position:absolute;pointer-events:none;z-index:30;animation:spFloat .8s ease-out forwards;}
@keyframes spFloat{0%{opacity:1;transform:scale(0) rotate(0)}60%{opacity:1;transform:scale(1.3) rotate(20deg)}100%{opacity:0;transform:scale(.8) rotate(45deg) translateY(-40px)}}

/* water drip during bath */
.drip{position:absolute;width:6px;height:12px;border-radius:50%;background:rgba(100,200,255,.7);pointer-events:none;animation:dripFall .6s ease-in forwards;z-index:25;}
@keyframes dripFall{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(60px)}}

/* ── BOTTOM PANEL ── */
#panel{
  position:relative;z-index:10;
  flex-shrink:0;
  padding:10px 12px;
  padding-bottom:calc(10px + var(--safe-bottom));
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.15);
  display:flex;flex-direction:column;gap:8px;align-items:center;
}
#phase-label{font-size:1.6rem;letter-spacing:2px;}

/* action buttons */
#action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.abtn{
  width:70px;height:70px;border-radius:20px;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:2rem;
  background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.2);
  color:#fff;
  transition:transform .1s,background .2s,border-color .2s,box-shadow .1s;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
  -webkit-user-select:none;user-select:none;
  position:relative;
  flex-shrink:0;
}
.abtn:active{transform:scale(.88);}
.abtn.selected{background:rgba(199,125,255,.4);border-color:var(--lilac);box-shadow:0 0 20px rgba(199,125,255,.5);}
.abtn.done{background:rgba(100,200,120,.3);border-color:#80e090;box-shadow:0 0 15px rgba(100,200,120,.4);}
.abtn .tick{position:absolute;top:-5px;right:-5px;background:#66BB6A;color:#fff;border-radius:50%;width:20px;height:20px;font-size:.7rem;display:flex;align-items:center;justify-content:center;font-weight:900;}

/* hint text for bath */
#bath-hint{color:rgba(255,255,255,.6);font-size:.85rem;text-align:center;}

/* next button */
#next-btn{
  background:linear-gradient(135deg,#C77DFF,#9C27B0);
  border:none;border-radius:50px;
  padding:12px 32px;font-size:1.8rem;color:#fff;cursor:pointer;
  box-shadow:0 5px 20px rgba(199,125,255,.5);
  transition:transform .1s,box-shadow .1s;
  display:none;
}
#next-btn.show{display:block;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
#next-btn:active{transform:scale(.93);}

/* ── CUSTOMISATION TRAY (hair/clothes) ── */
#custom-tray{
  display:flex;gap:8px;overflow-x:auto;padding:4px 2px;
  scrollbar-width:none;width:100%;justify-content:center;
}
#custom-tray::-webkit-scrollbar{display:none;}
.ctile{
  flex-shrink:0;width:64px;height:64px;border-radius:16px;border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;transition:transform .1s,border-color .2s,box-shadow .2s;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
}
.ctile:active{transform:scale(.88);}
.ctile.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.5);transform:scale(1.08);}

/* ── CELEBRATION ── */
#celebration{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:radial-gradient(ellipse at center,rgba(60,0,80,.95) 0%,rgba(10,0,30,.98) 100%);
  opacity:0;pointer-events:none;
  transition:opacity .6s;
}
#celebration.show{opacity:1;pointer-events:auto;}
#celeb-wrap{position:relative;width:min(60vw,240px);}
#celeb-princess{width:100%;height:auto;display:block;overflow:visible;}
#celeb-glow{position:absolute;inset:-20px;background:radial-gradient(ellipse,rgba(255,215,0,.3),transparent 70%);animation:glow 2s ease-in-out infinite alternate;pointer-events:none;}
@keyframes glow{0%{transform:scale(1)}100%{transform:scale(1.15)}}
#celeb-title{font-size:2.5rem;color:var(--gold);text-shadow:0 0 20px var(--gold);letter-spacing:4px;}
#celeb-stars{font-size:2rem;letter-spacing:6px;}
#play-again{
  background:linear-gradient(135deg,#FFD700,#FFA000);
  border:none;border-radius:50px;padding:16px 36px;font-size:2rem;
  cursor:pointer;color:#4A235A;font-weight:900;
  box-shadow:0 6px 25px rgba(255,215,0,.4);
  transition:transform .1s;
}
#play-again:active{transform:scale(.93);}

/* confetti */
.cpiece{position:fixed;border-radius:2px;pointer-events:none;z-index:300;animation:cfall linear forwards;}
@keyframes cfall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* flash */
#flash{position:fixed;inset:0;z-index:190;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
#flash.on{opacity:.6;}
</style>
</head>
<body>
<div id="stars-bg"></div>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="star-track"></div>
    <div id="phase-indicator"></div>
  </div>

  <!-- SCENE -->
  <div id="scene">

    <!-- Room background SVG -->
    <svg id="room-bg" viewBox="0 0 400 480" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <!-- wall -->
      <defs>
        <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2d1b4e"/>
          <stop offset="100%" stop-color="#3d2060"/>
        </linearGradient>
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a0a2e"/>
          <stop offset="100%" stop-color="#0d0520"/>
        </linearGradient>
        <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe4a0" stop-opacity=".6"/>
          <stop offset="100%" stop-color="#ffb74d" stop-opacity=".1"/>
        </radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="softglow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <rect width="400" height="480" fill="url(#wallGrad)"/>

      <!-- floor -->
      <rect y="370" width="400" height="110" fill="url(#floorGrad)"/>
      <!-- floor shine -->
      <ellipse cx="200" cy="372" rx="180" ry="6" fill="rgba(255,255,255,.04)"/>

      <!-- wall panel decoration -->
      <rect x="10" y="10" width="380" height="360" rx="4" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="2"/>
      <rect x="20" y="20" width="360" height="340" rx="3" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="1"/>

      <!-- Window left -->
      <g filter="url(#softglow)">
        <rect x="18" y="40" width="85" height="110" rx="8" fill="#1a0a2e" stroke="#7B1FA2" stroke-width="2"/>
        <rect x="22" y="44" width="77" height="102" rx="6" fill="url(#windowGlow)"/>
        <line x1="60" y1="44" x2="60" y2="146" stroke="#7B1FA2" stroke-width="1.5"/>
        <line x1="22" y1="95" x2="99" y2="95" stroke="#7B1FA2" stroke-width="1.5"/>
        <!-- stars outside -->
        <circle cx="35" cy="65" r="2" fill="#FFD700" opacity=".8"/>
        <circle cx="75" cy="55" r="1.5" fill="#fff" opacity=".7"/>
        <circle cx="88" cy="78" r="2" fill="#FFD700" opacity=".6"/>
        <circle cx="42" cy="120" r="1.5" fill="#fff" opacity=".5"/>
        <!-- moon -->
        <path d="M55,70 Q65,75 55,90 Q48,82 55,70Z" fill="#FFE082"/>
      </g>
      <!-- curtain left -->
      <path d="M18,40 Q32,75 22,146 L18,146Z" fill="#7B1FA2" opacity=".7"/>
      <path d="M103,40 Q89,75 99,146 L103,146Z" fill="#7B1FA2" opacity=".7"/>

      <!-- Window right -->
      <g filter="url(#softglow)">
        <rect x="297" y="40" width="85" height="110" rx="8" fill="#1a0a2e" stroke="#7B1FA2" stroke-width="2"/>
        <rect x="301" y="44" width="77" height="102" rx="6" fill="url(#windowGlow)"/>
        <line x1="339" y1="44" x2="339" y2="146" stroke="#7B1FA2" stroke-width="1.5"/>
        <line x1="301" y1="95" x2="378" y2="95" stroke="#7B1FA2" stroke-width="1.5"/>
        <circle cx="315" cy="60" r="2" fill="#FFD700" opacity=".8"/>
        <circle cx="358" cy="72" r="1.5" fill="#fff" opacity=".7"/>
        <circle cx="325" cy="115" r="2" fill="#FFD700" opacity=".6"/>
        <path d="M350,58 Q360,63 350,78 Q343,70 350,58Z" fill="#FFE082"/>
      </g>
      <path d="M297,40 Q311,75 301,146 L297,146Z" fill="#7B1FA2" opacity=".7"/>
      <path d="M382,40 Q368,75 378,146 L382,146Z" fill="#7B1FA2" opacity=".7"/>

      <!-- Mirror / vanity centre top -->
      <g filter="url(#glow)">
        <ellipse cx="200" cy="90" rx="48" ry="58" fill="#0d0520" stroke="#FFD700" stroke-width="2.5"/>
        <ellipse cx="200" cy="90" rx="42" ry="52" fill="#1a0a2e" stroke="#FFD700" stroke-width="1" opacity=".5"/>
        <!-- reflection shimmer -->
        <ellipse cx="185" cy="72" rx="8" ry="14" fill="rgba(255,255,255,.04)"/>
      </g>
      <!-- mirror frame ornaments -->
      <circle cx="200" cy="34" r="5" fill="#FFD700" filter="url(#glow)"/>
      <circle cx="152" cy="58" r="3.5" fill="#FFD700" filter="url(#glow)"/>
      <circle cx="248" cy="58" r="3.5" fill="#FFD700" filter="url(#glow)"/>

      <!-- Vanity table -->
      <rect x="130" y="148" width="140" height="12" rx="5" fill="#4a235a" stroke="#7B1FA2" stroke-width="1.5"/>
      <!-- table legs -->
      <rect x="138" y="160" width="8" height="50" rx="4" fill="#4a235a"/>
      <rect x="254" y="160" width="8" height="50" rx="4" fill="#4a235a"/>
      <!-- table surface items -->
      <rect x="148" y="136" width="10" height="14" rx="3" fill="#F48FB1"/><!-- perfume -->
      <ellipse cx="153" cy="134" rx="5" ry="3" fill="#F48FB1"/>
      <rect x="170" y="140" width="8" height="10" rx="2" fill="#80DEEA"/><!-- cream -->
      <circle cx="220" cy="142" r="7" fill="#CE93D8" opacity=".8"/><!-- powder -->
      <rect x="230" y="138" width="6" height="12" rx="3" fill="#FFD700"/><!-- lipstick -->
      <!-- brush -->
      <rect x="240" y="132" width="4" height="18" rx="2" fill="#795548"/>
      <ellipse cx="242" cy="131" rx="5" ry="3" fill="#FFF8E7"/>

      <!-- Dirty items on floor -->
      <!-- puddle -->
      <ellipse id="floor-puddle" cx="120" cy="400" rx="35" ry="12" fill="#5C6BC0" opacity=".35"/>
      <!-- sock -->
      <g id="floor-sock">
        <path d="M290,390 Q305,384 322,388 Q334,396 328,405 Q315,410 300,402Z" fill="#F48FB1" transform="rotate(12,308,395)"/>
        <ellipse cx="295" cy="397" rx="8" ry="5" fill="#F48FB1" transform="rotate(12,295,397)"/>
      </g>
      <!-- hair clip on floor -->
      <g id="floor-clip">
        <ellipse cx="160" cy="408" rx="15" ry="5" fill="#FFD700" transform="rotate(-20,160,408)"/>
        <ellipse cx="160" cy="408" rx="8" ry="3" fill="#FFA000" transform="rotate(-20,160,408)"/>
      </g>
      <!-- dust bunnies -->
      <ellipse id="dust1" cx="80" cy="430" rx="20" ry="7" fill="#78909C" opacity=".3"/>
      <ellipse id="dust2" cx="340" cy="420" rx="16" ry="5" fill="#78909C" opacity=".3"/>
      <!-- toy star on floor -->
      <g id="floor-star">
        <path d="M340,385 L344,374 L348,385 L359,385 L351,392 L354,403 L344,397 L334,403 L337,392 L329,385Z" fill="#FFD700" opacity=".7" transform="rotate(15,344,388)"/>
      </g>

      <!-- floor wall baseboard -->
      <rect x="0" y="368" width="400" height="8" rx="0" fill="#4a235a"/>
    </svg>

    <!-- PRINCESS -->
    <div id="princess-wrap">
      <svg id="princess-svg" viewBox="0 0 200 360" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <defs>
          <radialGradient id="skinGrad" cx="45%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#FFE0B2"/>
            <stop offset="100%" stop-color="#FFCC80"/>
          </radialGradient>
          <radialGradient id="dressGrad" cx="50%" cy="20%" r="80%">
            <stop offset="0%" stop-color="#F48FB1" id="dg1"/>
            <stop offset="100%" stop-color="#C2185B" id="dg2"/>
          </radialGradient>
          <radialGradient id="shadowGrad" cx="50%" cy="0%" r="100%">
            <stop offset="0%" stop-color="rgba(0,0,0,.4)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
          <filter id="charGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <clipPath id="headClip"><ellipse cx="100" cy="82" rx="54" ry="56"/></clipPath>
        </defs>

        <!-- shadow on floor -->
        <ellipse cx="100" cy="358" rx="55" ry="10" fill="url(#shadowGrad)"/>

        <!-- ═══════════════════════════════════════════════
             LAYER ORDER (back → front):
             1. hair-back   — volume behind head
             2. dress-skirt — wide skirt
             3. arms        — behind torso sides
             4. dress-bodice— torso
             5. neck + necklace
             6. head        — face base + ears
             7. face        — eyes, mouth, nose, cheeks
             8. hair-front  — fringe + top that overlaps forehead
             9. hair-acc    — bows, tiara, flowers
            10. crown       — on top of everything
        ═══════════════════════════════════════════════ -->

        <!-- 1 ── HAIR BACK (behind everything — sides, length, bulk) -->
        <g id="hair-back">
          <!-- back volume ellipse -->
          <ellipse cx="100" cy="60" rx="57" ry="44" fill="#5D4037"/>
          <!-- side volume bulges -->
          <path d="M44,65 Q28,50 38,28 Q52,38 46,62Z" fill="#5D4037"/>
          <path d="M156,65 Q172,50 162,28 Q148,38 154,62Z" fill="#5D4037"/>
          <!-- top spikes (messy) -->
          <path d="M100,28 Q88,5 108,10 Q105,32 100,28Z M72,22 Q62,2 78,8 Q78,26 72,22Z M128,22 Q138,2 122,8 Q122,26 128,22Z" fill="#4E342E"/>
        </g>

        <!-- 2 ── DRESS SKIRT -->
        <g id="dress-skirt">
          <path d="M55,195 Q10,270 5,340 Q30,355 100,358 Q170,355 195,340 Q190,270 145,195 Z"
                fill="url(#dressGrad)" id="skirt-path"/>
          <path d="M65,210 Q30,265 28,335 Q60,348 100,350 Q140,348 172,335 Q170,265 135,210Z"
                fill="rgba(255,255,255,.08)"/>
          <path d="M8,338 Q55,358 100,360 Q145,358 192,338 Q160,350 100,352 Q40,350 8,338Z"
                fill="rgba(255,255,255,.25)"/>
          <circle cx="60"  cy="280" r="3" fill="rgba(255,255,255,.5)"/>
          <circle cx="145" cy="260" r="2" fill="rgba(255,255,255,.4)"/>
          <circle cx="80"  cy="310" r="2.5" fill="rgba(255,255,255,.4)"/>
          <circle cx="130" cy="300" r="3" fill="rgba(255,255,255,.5)"/>
          <circle cx="100" cy="335" r="2" fill="rgba(255,255,255,.35)"/>
        </g>

        <!-- 3 ── ARMS (behind bodice) -->
        <g id="arms">
          <path d="M68,155 Q40,160 30,190 Q35,200 45,198 Q52,175 72,170Z" fill="url(#skinGrad)"/>
          <ellipse cx="37" cy="197" rx="13" ry="11" fill="url(#skinGrad)"/>
          <path d="M55,175 Q38,180 28,195 Q32,198 38,200 Q50,185 62,178Z" fill="url(#dressGrad)" opacity=".7"/>
          <path d="M132,155 Q160,160 170,190 Q165,200 155,198 Q148,175 128,170Z" fill="url(#skinGrad)"/>
          <ellipse cx="163" cy="197" rx="13" ry="11" fill="url(#skinGrad)"/>
          <path d="M145,175 Q162,180 172,195 Q168,198 162,200 Q150,185 138,178Z" fill="url(#dressGrad)" opacity=".7"/>
        </g>

        <!-- 4 ── DRESS BODICE -->
        <g id="dress-bodice">
          <path d="M68,148 Q55,165 55,195 L145,195 Q145,165 132,148 Z"
                fill="url(#dressGrad)" id="bodice-path"/>
          <path d="M75,152 Q65,168 66,190 Q80,195 100,195 Q120,195 134,190 Q135,168 125,152Z"
                fill="rgba(255,255,255,.12)"/>
          <path d="M85,152 Q100,145 115,152 Q108,158 100,156 Q92,158 85,152Z"
                fill="rgba(255,255,255,.3)"/>
        </g>

        <!-- 5 ── NECK + NECKLACE -->
        <rect x="88" y="128" width="24" height="26" rx="8" fill="url(#skinGrad)"/>
        <path d="M82,140 Q100,148 118,140" stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round" id="necklace"/>
        <circle cx="100" cy="147" r="4" fill="#FFD700" id="necklace-gem"/>

        <!-- 6 ── HEAD BASE + EARS -->
        <g id="head-group">
          <!-- ear left (drawn before head so head overlaps outer ear edge) -->
          <ellipse cx="47" cy="88" rx="11" ry="14" fill="url(#skinGrad)"/>
          <ellipse cx="47" cy="88" rx="5" ry="7" fill="#FFAB91" opacity=".4"/>
          <circle cx="47" cy="101" r="4" fill="#FFD700" id="earring-l"/>
          <circle cx="47" cy="101" r="2" fill="#E91E63" id="earring-gem-l"/>
          <!-- ear right -->
          <ellipse cx="153" cy="88" rx="11" ry="14" fill="url(#skinGrad)"/>
          <ellipse cx="153" cy="88" rx="5" ry="7" fill="#FFAB91" opacity=".4"/>
          <circle cx="153" cy="101" r="4" fill="#FFD700" id="earring-r"/>
          <circle cx="153" cy="101" r="2" fill="#E91E63" id="earring-gem-r"/>
          <!-- head shape on top of ears -->
          <ellipse id="head-shape" cx="100" cy="85" rx="54" ry="56" fill="url(#skinGrad)"/>
          <!-- subtle jaw shadow -->
          <path d="M58,110 Q100,138 142,110 Q140,128 100,134 Q60,128 58,110Z" fill="#FFCC80" opacity=".4"/>
        </g>

// CONFIG
// ══════════════════════════════════════════════════════════════════
const TOTAL_STARS = 12;
let starsLit = 0;
let currentPhase = 0; // 0=bath 1=hair 2=dress 3=room 4=done

// ── background stars
(function(){
  const bg = document.getElementById('stars-bg');

    bg.appendChild(s);

})();

// ── star track
function buildStars(){
  const t=document.getElementById('star-track');
  t.innerHTML='';
  for(let i=0;i<TOTAL_STARS;i++){
    const s=document.createElement('span');
    s.className='star-pip'; s.id=`sp${i}`; s.textContent='⭐';
    t.appendChild(s);
  }
}

function addStars(n){
  for(let i=0;i<n;i++){
    if(starsLit>=TOTAL_STARS) break;
    const el=document.getElementById(`sp${starsLit}`);
    el.classList.add('lit','pop');
    setTimeout(()=>el.classList.remove('pop'),400);
    starsLit++;
  }
}

// ── phase indicators
const PHASE_ICONS=['🛁','💇','👗','🏠'];
function buildPhaseIndicator(){
  const el=document.getElementById('phase-indicator');
  el.innerHTML=PHASE_ICONS.map((ic,i)=>`<span class="phase-dot ${i===currentPhase?'active':''}" id="pd${i}">${ic}</span>`).join('');
}
function updatePhaseIndicator(){
  PHASE_ICONS.forEach((_,i)=>{
    const el=document.getElementById(`pd${i}`);
    if(el) el.className='phase-dot'+(i<=currentPhase?' active':'');
  });
}

// ══════════════════════════════════════════════════════════════════
// DIRT CANVAS — erase with finger
// ══════════════════════════════════════════════════════════════════
let dirtCtx, dirtCanvas, dirtActive=false, lastDX=0, lastDY=0;
let dirtCleaned=0; // 0–100 %
let bathPhaseComplete=false;

function setupDirtCanvas(){
  dirtCanvas=document.getElementById('dirt-canvas');
  const wrap=document.getElementById('princess-wrap');
  // match canvas px to display px for crisp rendering
  const r=wrap.getBoundingClientRect();
  dirtCanvas.width=r.width*2;
  dirtCanvas.height=r.height*2;
  dirtCanvas.style.width=r.width+'px';
  dirtCanvas.style.height=r.height+'px';

  dirtCtx=dirtCanvas.getContext('2d');
  drawDirt();
  updateDirtInteraction(false);
}

function drawDirt(){
  const W=dirtCanvas.width, H=dirtCanvas.height;
  dirtCtx.clearRect(0,0,W,H);
  dirtCtx.save();

  // big irregular splodges
  const blobs=[
    {x:.3,y:.3,rx:.18,ry:.14,c:'rgba(80,50,20,.65)'},
    {x:.65,y:.22,rx:.14,ry:.10,c:'rgba(70,45,15,.6)'},
    {x:.5,y:.55,rx:.20,ry:.13,c:'rgba(90,55,20,.6)'},
    {x:.2,y:.65,rx:.12,ry:.09,c:'rgba(75,48,18,.55)'},
    {x:.75,y:.58,rx:.15,ry:.10,c:'rgba(80,52,20,.58)'},
    {x:.45,y:.78,rx:.16,ry:.08,c:'rgba(70,45,16,.5)'},
    {x:.15,y:.42,rx:.10,ry:.08,c:'rgba(85,54,22,.52)'},
    {x:.82,y:.38,rx:.10,ry:.08,c:'rgba(78,50,19,.5)'},
  ];
  blobs.forEach(b=>{
    dirtCtx.beginPath();
    dirtCtx.ellipse(b.x*W, b.y*H, b.rx*W, b.ry*H, Math.random()*.5, 0, Math.PI*2);
    dirtCtx.fillStyle=b.c;
    dirtCtx.fill();
  });
  // small dots
  for(let i=0;i<30;i++){
    dirtCtx.beginPath();
    dirtCtx.arc(Math.random()*W, Math.random()*H, 3+Math.random()*8, 0, Math.PI*2);
    dirtCtx.fillStyle=`rgba(${60+Math.random()*30},${35+Math.random()*20},${10+Math.random()*10},.45)`;
    dirtCtx.fill();
  }
  dirtCtx.restore();
  dirtCleaned=0;
  bathPhaseComplete=false;
}

function updateDirtInteraction(enabled){
  const canvas=dirtCanvas;
  if(enabled){
    canvas.style.pointerEvents='auto';
  } else {
    canvas.style.pointerEvents='none';
  }
}

function getDirtPos(e){
  const rect=dirtCanvas.getBoundingClientRect();
  const scaleX=dirtCanvas.width/rect.width;
  const scaleY=dirtCanvas.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return [(src.clientX-rect.left)*scaleX, (src.clientY-rect.top)*scaleY];
}

function eraseDirt(x,y){
  dirtCtx.save();
  dirtCtx.globalCompositeOperation='destination-out';
  // big soft eraser
  const grad=dirtCtx.createRadialGradient(x,y,0,x,y,60);
  grad.addColorStop(0,'rgba(0,0,0,1)');
  grad.addColorStop(.6,'rgba(0,0,0,.8)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  dirtCtx.fillStyle=grad;
  dirtCtx.beginPath();
  dirtCtx.arc(x,y,60,0,Math.PI*2);
  dirtCtx.fill();
  dirtCtx.restore();
  spawnBubbleAt(x,y);
  checkDirtProgress();
}

function checkDirtProgress(){
  // sample pixels to see how much dirt remains
  const data=dirtCtx.getImageData(0,0,dirtCanvas.width,dirtCanvas.height).data;
  let nonZero=0;
  for(let i=3;i<data.length;i+=16) if(data[i]>20) nonZero++;
  const total=data.length/64;
  const pct=1-(nonZero/total);
  dirtCleaned=Math.min(100,pct*100);

  if(dirtCleaned>70 && !bathPhaseComplete){
    bathPhaseComplete=true;
    onBathComplete();
  }
}

function onBathComplete(){
  // fade canvas out
  dirtCanvas.style.transition='opacity .8s';
  dirtCanvas.style.opacity='0';
  setFace(true);
  addStars(3);
  spawnSparklesAround();
  setTimeout(()=>{ document.getElementById('next-btn').classList.add('show'); },600);
}

// touch/mouse events for dirt
function setupDirtEvents(){
  const canvas=dirtCanvas;
  function start(e){
    e.preventDefault();
    dirtActive=true;
    const[x,y]=getDirtPos(e);
    lastDX=x; lastDY=y;
    eraseDirt(x,y);
  }
  function move(e){
    e.preventDefault();
    if(!dirtActive) return;
    const[x,y]=getDirtPos(e);
    // interpolate for smooth erasing
    const dist=Math.hypot(x-lastDX,y-lastDY);
    const steps=Math.max(1,Math.floor(dist/20));
    for(let i=1;i<=steps;i++){
      const ix=lastDX+(x-lastDX)*(i/steps);
      const iy=lastDY+(y-lastDY)*(i/steps);
      eraseDirt(ix,iy);
    }
    lastDX=x; lastDY=y;
  }
  function stop(){ dirtActive=false; }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',stop);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',stop,{passive:false});
}

// ══════════════════════════════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════════════════════════════
function spawnBubbleAt(cx,cy){
  if(Math.random()>.4) return; // throttle
  const scene=document.getElementById('scene');
  const canvas=dirtCanvas;
  const rect=canvas.getBoundingClientRect();
  const sceneRect=scene.getBoundingClientRect();
  const scaleX=rect.width/canvas.width;
  const scaleY=rect.height/canvas.height;
  const sx=rect.left-sceneRect.left+cx*scaleX;
  const sy=rect.top -sceneRect.top +cy*scaleY;
  const b=document.createElement('div');
  b.className='bubble';
  const sz=8+Math.random()*16;
  b.style.cssText=`width:${sz}px;height:${sz}px;left:${sx-sz/2}px;top:${sy-sz/2}px;
    animation-duration:${.8+Math.random()*.8}s;animation-delay:${Math.random()*.2}s`;
  scene.appendChild(b);
  setTimeout(()=>b.remove(),1800);
}

function spawnSparklesAround(){
  const wrap=document.getElementById('princess-wrap');
  const scene=document.getElementById('scene');
  const r=wrap.getBoundingClientRect();
  const sr=scene.getBoundingClientRect();
  ['✨','⭐','💫','🌟','✨','⭐'].forEach((ic,i)=>{
    const el=document.createElement('div');
    el.className='sparkle-el';
    el.textContent=ic; el.style.fontSize='1.6rem';
    el.style.left=(r.left-sr.left+20+i*28)+'px';
    el.style.top =(r.top -sr.top +10+(i%2)*35)+'px';
    el.style.animationDelay=(i*.08)+'s';
    scene.appendChild(el);
    setTimeout(()=>el.remove(),900);
  });
}

           <path d="M112,62 Q113,41 102,34 Q101,52 105,63Z" fill="#5D4037"/>
           <path d="M130,68 Q133,47 120,37 Q118,54 122,70Z" fill="#4E342E"/>
           <path d="M145,76 Q150,55 138,42 Q134,58 138,76Z" fill="#5D4037"/>`,
    acc:`<path d="M62,44 Q100,37 138,44 Q128,53 100,51 Q72,53 62,44Z" fill="#CE93D8" opacity=".9"/>
         <circle cx="100" cy="28" r="6" fill="#CE93D8"/>
         <circle cx="83"  cy="32" r="4" fill="#CE93D8"/>
         <circle cx="117" cy="32" r="4" fill="#CE93D8"/>
         <circle cx="100" cy="28" r="2.5" fill="#fff" opacity=".6"/>` },
];

let selHair=-1;
function renderHairPhase(){
  document.getElementById('phase-label').textContent='💇';
  document.getElementById('action-row').innerHTML='';
  const tray=document.getElementById('custom-tray');
  tray.style.display='flex';
  tray.innerHTML=HAIR_STYLES.map((h,i)=>`
    <div class="ctile ${selHair===i?'selected':''}" onclick="applyHair(${i})">${h.emoji}</div>
  `).join('');
  updateDirtInteraction(false);
}
let hairDoneOnce=false;
function applyHair(i){
  selHair=i;
  const h=HAIR_STYLES[i];
  document.getElementById('hair-back').innerHTML=h.back;
  document.getElementById('hair-front').innerHTML=h.front;
  document.getElementById('hair-acc-group').innerHTML=h.acc;
  spawnSparklesAround();
  if(!hairDoneOnce){ hairDoneOnce=true; addStars(3); }
  renderHairPhase();
  document.getElementById('next-btn').classList.add('show');
}

// ══════════════════════════════════════════════════════════════════
// DRESS / COLOURS
// ══════════════════════════════════════════════════════════════════
const DRESSES=[
  { emoji:'💗', c1:'#F48FB1', c2:'#C2185B', shoe:'#7B1FA2', gem:'#E91E63' },
  { emoji:'💙', c1:'#81D4FA', c2:'#0277BD', shoe:'#1A237E', gem:'#4FC3F7' },
  { emoji:'💚', c1:'#A5D6A7', c2:'#2E7D32', shoe:'#1B5E20', gem:'#66BB6A' },
  { emoji:'💜', c1:'#CE93D8', c2:'#6A1B9A', shoe:'#4A148C', gem:'#AB47BC' },
  { emoji:'🧡', c1:'#FFCC80', c2:'#E65100', shoe:'#BF360C', gem:'#FF9800' },
  { emoji:'❤️', c1:'#EF9A9A', c2:'#B71C1C', shoe:'#7F0000', gem:'#EF5350' },
];
let selDress=-1;
function renderDressPhase(){
  document.getElementById('phase-label').textContent='👗';
  document.getElementById('action-row').innerHTML='';
  const tray=document.getElementById('custom-tray');
  tray.style.display='flex';
  tray.innerHTML=DRESSES.map((d,i)=>`
    <div class="ctile ${selDress===i?'selected':''}" onclick="applyDress(${i})">${d.emoji}</div>
  `).join('');
}
let dressDoneOnce=false;
function applyDress(i){
  selDress=i;
  const d=DRESSES[i];
  document.getElementById('dg1').setAttribute('stop-color',d.c1);
  document.getElementById('dg2').setAttribute('stop-color',d.c2);
  document.getElementById('shoe-l')||0;
  // shoes: find ellipses by updating shoe fill via JS
  document.querySelectorAll('[id^="shoe"]').forEach(el=>el.setAttribute('fill',d.shoe));
  // earring gems
  document.getElementById('earring-gem-l').setAttribute('fill',d.gem);
  document.getElementById('earring-gem-r').setAttribute('fill',d.gem);
  document.getElementById('necklace-gem').setAttribute('fill',d.gem);
  spawnSparklesAround();
  if(!dressDoneOnce){ dressDoneOnce=true; addStars(3); }
  renderDressPhase();
  document.getElementById('next-btn').classList.add('show');
}

// ══════════════════════════════════════════════════════════════════
// ROOM CLEANING
// ══════════════════════════════════════════════════════════════════
const ROOM_TASKS=[
  { emoji:'🧹', label:'', targets:['dust1','dust2','floor-puddle'] },
  { emoji:'🧺', label:'', targets:['floor-sock','floor-clip'] },
  { emoji:'🌟', label:'', targets:['floor-star'] },
];
let roomDone=[false,false,false];
function renderRoomPhase(){
  document.getElementById('phase-label').textContent='🏠';
  document.getElementById('custom-tray').style.display='none';
  const row=document.getElementById('action-row');
  row.innerHTML=ROOM_TASKS.map((t,i)=>`
    <button class="abtn ${roomDone[i]?'done':''}" onclick="doRoom(${i})">
      ${t.emoji}
      ${roomDone[i]?'<span class="tick">✓</span>':''}
    </button>
  `).join('');
}
let roomStarsGiven=false;
function doRoom(i){
  if(roomDone[i]) return;
  roomDone[i]=true;
  ROOM_TASKS[i].targets.forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.style.transition='opacity .6s'; el.style.opacity='0'; }
  });
  spawnSparklesAround();
  renderRoomPhase();
  if(roomDone.every(Boolean)){
    if(!roomStarsGiven){ roomStarsGiven=true; addStars(3); }
    // show crown!
    const crown=document.getElementById('crown');
    crown.style.transition='opacity .8s'; crown.style.opacity='1';
    setTimeout(()=>{ document.getElementById('next-btn').onclick=celebrate; document.getElementById('next-btn').classList.add('show'); },600);
  }
}

// ══════════════════════════════════════════════════════════════════
// PHASE FLOW
// ══════════════════════════════════════════════════════════════════
const PHASE_RENDERS=[
  renderBathPhase, renderHairPhase, renderDressPhase, renderRoomPhase
];

function renderBathPhase(){
  document.getElementById('phase-label').textContent='🛁';
  document.getElementById('action-row').innerHTML='';
  document.getElementById('custom-tray').style.display='none';
  const hint=document.getElementById('bath-hint');
  hint.style.display='block';
  hint.textContent='👆 Esfrega com o dedo!';
  updateDirtInteraction(true);
}

function nextPhase(){
  flash();
  setTimeout(()=>{
    currentPhase++;
    document.getElementById('next-btn').classList.remove('show');
    document.getElementById('next-btn').onclick=nextPhase;
    if(currentPhase<PHASE_RENDERS.length){
      updatePhaseIndicator();
      PHASE_RENDERS[currentPhase]();
      // hide bath hint in later phases
      if(currentPhase>0) document.getElementById('bath-hint').style.display='none';
    }
  },220);
}

function flash(){
  const el=document.getElementById('flash');
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),220);
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATE
// ══════════════════════════════════════════════════════════════════
function celebrate(){
  flash();
  setTimeout(()=>{
    // clone princess SVG into celebration
    const src=document.getElementById('princess-svg');
    document.getElementById('celeb-princess').innerHTML=src.innerHTML;
    document.getElementById('celebration').classList.add('show');
    launchConfetti();
    addStars(TOTAL_STARS-starsLit); // fill any remaining
  },220);
}

function launchConfetti(){
  const cols=['#F48FB1','#FFD700','#C77DFF','#80DEEA','#fff','#E91E63','#4FC3F7'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    const sz=8+Math.random()*14;
    el.style.cssText=`width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'};
      left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

// ══════════════════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════════════════
function resetGame(){
  document.getElementById('celebration').classList.remove('show');
  currentPhase=0; starsLit=0;
  selHair=-1; selDress=-1;
  hairDoneOnce=false; dressDoneOnce=false;
  roomDone=[false,false,false]; roomStarsGiven=false;

  // reset stars
  document.querySelectorAll('.star-pip').forEach(s=>s.classList.remove('lit','pop'));

  // reset face
  setFace(false);

  // reset hair to messy (back layer)
  document.getElementById('hair-back').innerHTML=`
    <ellipse cx="100" cy="60" rx="57" ry="44" fill="#5D4037"/>
    <path d="M44,65 Q28,50 38,28 Q52,38 46,62Z" fill="#5D4037"/>
    <path d="M156,65 Q172,50 162,28 Q148,38 154,62Z" fill="#5D4037"/>
    <path d="M100,28 Q88,5 108,10 Q105,32 100,28Z M72,22 Q62,2 78,8 Q78,26 72,22Z M128,22 Q138,2 122,8 Q122,26 128,22Z" fill="#4E342E"/>
  `;
  // reset hair front (fringe)
  document.getElementById('hair-front').innerHTML=`
    <path d="M54,72 Q48,52 58,38 Q64,55 60,72Z" fill="#5D4037"/>
    <path d="M70,63 Q66,40 78,30 Q80,50 76,65Z" fill="#4E342E"/>
    <path d="M88,58 Q86,34 98,28 Q97,48 93,60Z" fill="#5D4037"/>
    <path d="M112,58 Q114,34 102,28 Q103,48 107,60Z" fill="#5D4037"/>
    <path d="M130,63 Q134,40 122,30 Q120,50 124,65Z" fill="#4E342E"/>
    <path d="M146,72 Q152,52 142,38 Q136,55 140,72Z" fill="#5D4037"/>
    <path d="M44,68 Q26,44 40,26" stroke="#4E342E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M156,68 Q174,44 160,26" stroke="#4E342E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  `;
  document.getElementById('hair-acc-group').innerHTML='';

  // reset dress to pink
  document.getElementById('dg1').setAttribute('stop-color','#F48FB1');
  document.getElementById('dg2').setAttribute('stop-color','#C2185B');
  document.getElementById('earring-gem-l').setAttribute('fill','#E91E63');
  document.getElementById('earring-gem-r').setAttribute('fill','#E91E63');
  document.getElementById('necklace-gem').setAttribute('fill','#FFD700');

  // reset crown
  document.getElementById('crown').style.opacity='0';
  document.getElementById('crown').style.transition='';

  // reset floor items
  ['dust1','dust2','floor-puddle','floor-sock','floor-clip','floor-star'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.style.transition=''; el.style.opacity=''; }
  });

  // reset dirt canvas
  dirtCanvas.style.transition='';
  dirtCanvas.style.opacity='1';
  drawDirt();
  updateDirtInteraction(false);

  // reset bath hint
  document.getElementById('bath-hint').style.display='none';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('next-btn').onclick=nextPhase;

  buildPhaseIndicator();
  flash();
  setTimeout(renderBathPhase,220);
}

// ══════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════
buildStars();
buildPhaseIndicator();
setupDirtCanvas();
setupDirtEvents();
renderBathPhase();

// resize handler
window.addEventListener('resize',()=>{
  const wrap=document.getElementById('princess-wrap');
  const r=wrap.getBoundingClientRect();
  const prevW=dirtCanvas.width, prevH=dirtCanvas.height;
  const imgData=dirtCtx.getImageData(0,0,prevW,prevH);
  dirtCanvas.width=r.width*2;
  dirtCanvas.height=r.height*2;
  dirtCanvas.style.width=r.width+'px';
  dirtCanvas.style.height=r.height+'px';
  // scale old image onto new canvas
  const tmp=document.createElement('canvas');
  tmp.width=prevW; tmp.height=prevH;
  tmp.getContext('2d').putImageData(imgData,0,0);
  dirtCtx.drawImage(tmp,0,0,dirtCanvas.width,dirtCanvas.height);
});

// PWA
if('serviceWorker' in navigator){
  const sw=`const C='princesa-v2';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})));
}
</script>
