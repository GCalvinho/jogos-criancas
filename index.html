<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jogos">
<meta name="theme-color" content="#FF5757">
<title>🎮 Os Meus Jogos</title>
<style>
  :root { --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100%; width: 100%;
    background: linear-gradient(160deg, #FFF0F5 0%, #FFF8E7 50%, #F0F8FF 100%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    touch-action: manipulation;
  }
  main {
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: calc(24px + var(--safe-top)) 20px calc(24px + var(--safe-bottom));
    gap: 28px;
  }
  .title-row { text-align: center; }
  .star-row { font-size: 2rem; letter-spacing: 4px; margin-bottom: 6px; }
  .title { font-size: 2rem; font-weight: 900; color: #333; }

  .cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }

  .card {
    background: #fff;
    border-radius: 28px;
    padding: 0;
    display: flex; align-items: center;
    box-shadow: 0 6px 0 rgba(0,0,0,.12);
    text-decoration: none;
    overflow: hidden;
    transition: transform .1s, box-shadow .1s;
    border: 3px solid transparent;
  }
  .card:active { transform: scale(.95) translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.12); }

  .card-icon {
    width: 100px; height: 100px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.2rem;
  }
  .card.rest .card-icon { background: #FF5757; }
  .card.hotel .card-icon { background: #7C5CBF; }
  .card.cafe  .card-icon { background: #C0622A; }

  .card-body { padding: 16px 16px 16px 12px; flex: 1; }
  .card-emoji-row { font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 4px; }
  .card-sub { font-size: 0.95rem; color: #999; font-weight: 600; }

  .footer { font-size: 1.6rem; opacity: .4; }
</style>
</head>
<body>
<main>
  <div class="title-row">
    <div class="star-row">⭐⭐⭐</div>
    <div class="title">Os Meus Jogos</div>
  </div>

  <div class="cards">
    <a class="card rest" href="restaurante.html">
      <div class="card-icon">🍽️</div>
      <div class="card-body">
        <div class="card-emoji-row">🍕 🍔 🍝 🍰</div>
        <div class="card-sub">Restaurante</div>
      </div>
    </a>
    <a class="card hotel" href="hotel.html">
      <div class="card-icon">🏨</div>
      <div class="card-body">
        <div class="card-emoji-row">🛏️ 🧖 🏊 ✨</div>
        <div class="card-sub">Hotel</div>
      </div>
    </a>
    <a class="card cafe" href="cafe.html">
      <div class="card-icon">☕</div>
      <div class="card-body">
        <div class="card-emoji-row">☕ 🥐 🍰 🍦</div>
        <div class="card-sub">Café &amp; Pastelaria</div>
      </div>
    </a>
  </div>

  <div class="footer">🎀 🌟 🎀</div>
</main>
</body>
</html>
