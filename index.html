<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jogos">
<meta name="theme-color" content="#FF5757">
<title>🎮 Os Meus Jogos</title>
<style>
  :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;width:100%;background:linear-gradient(160deg,#FFF0F5 0%,#FFF8E7 50%,#F0F8FF 100%);font-family:'Helvetica Neue',Arial,sans-serif;touch-action:manipulation;}
  main{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));gap:16px;}
  .title-row{text-align:center;}
  .star-row{font-size:1.8rem;letter-spacing:4px;margin-bottom:4px;}
  .title{font-size:1.9rem;font-weight:900;color:#333;}
  .cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px;}
  .card{background:#fff;border-radius:24px;padding:0;display:flex;align-items:center;box-shadow:0 6px 0 rgba(0,0,0,.12);text-decoration:none;overflow:hidden;transition:transform .1s,box-shadow .1s;}
  .card:active{transform:scale(.95) translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .card-icon{width:90px;height:90px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:2.8rem;}
  .card.rest  .card-icon{background:#FF5757;}
  .card.hotel .card-icon{background:#7C5CBF;}
  .card.cafe  .card-icon{background:#C0622A;}
  .card.clean .card-icon{background:#4FC3F7;}
  .card.recycle .card-icon{background:#43A047;}
  .card.escape .card-icon{background:#6A1B9A;}
  .card.pirate .card-icon{background:#1565C0;}
  .card-body{padding:14px 14px 14px 10px;flex:1;}
  .card-emoji-row{font-size:1.3rem;letter-spacing:2px;margin-bottom:3px;}
  .card-sub{font-size:.9rem;color:#999;font-weight:600;}
  .footer{font-size:1.4rem;opacity:.4;}
</style>
</head>
<body>
<main>
  <div class="title-row">
    <div class="star-row">⭐⭐⭐</div>
    <div class="title">Os Meus Jogos</div>
  </div>
  <div class="cards">
    <a class="card rest" href="restaurante.html">
      <div class="card-icon">🍽️</div>
      <div class="card-body">
        <div class="card-emoji-row">🍕 🍔 🍝 🍰</div>
        <div class="card-sub">Restaurante</div>
      </div>
    </a>
    <a class="card hotel" href="hotel.html">
      <div class="card-icon">🏨</div>
      <div class="card-body">
        <div class="card-emoji-row">🛏️ 🧖 🏊 ✨</div>
        <div class="card-sub">Hotel</div>
      </div>
    </a>
    <a class="card cafe" href="cafe.html">
      <div class="card-icon">☕</div>
      <div class="card-body">
        <div class="card-emoji-row">☕ 🥐 🍰 🍦</div>
        <div class="card-sub">Café &amp; Pastelaria</div>
      </div>
    </a>
    <a class="card clean" href="arrumar.html">
      <div class="card-icon">🛁</div>
      <div class="card-body">
        <div class="card-emoji-row">🚿 💇 👗 🏠</div>
        <div class="card-sub">Hora de Arrumar!</div>
      </div>
    </a>
    <a class="card recycle" href="reciclagem.html">
      <div class="card-icon">♻️</div>
      <div class="card-body">
        <div class="card-emoji-row">🟡 🔵 🟢 ⏱️</div>
        <div class="card-sub">Vamos Reciclar!</div>
      </div>
    </a>
  </div>
    <a class="card escape" href="princesa-fuga.html">
      <div class="card-icon">👸</div>
      <div class="card-body">
        <div class="card-emoji-row">🐉 💎 ✨ 🏆</div>
        <div class="card-sub">Fuga da Princesa</div>
      </div>
    </a>
  🎀 🌟 🎀</div>
</main>
</body>
</html>
