<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Reciclar">
<meta name="theme-color" content="#4CAF50">
<title>♻️ Reciclar!</title>
<style>
:root{
  --yellow:#FDD835; --blue:#1E88E5; --green:#43A047;
  --yellow-d:#F9A825; --blue-d:#1565C0; --green-d:#2E7D32;
  --yellow-l:#FFF9C4; --blue-l:#BBDEFB; --green-l:#C8E6C9;
  --sky1:#87CEEB; --sky2:#E0F7FA;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;
  background:linear-gradient(180deg,#87CEEB 0%,#E0F7FA 60%,#A5D6A7 100%);
  font-family:'Helvetica Neue',Arial,sans-serif;
  touch-action:none;
}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  padding-top:calc(8px + var(--safe-top));
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(10px);
  flex-shrink:0;
  z-index:20;
  border-bottom:2px solid rgba(255,255,255,.6);
}
#score-box{
  background:linear-gradient(135deg,#43A047,#2E7D32);
  color:#fff;border-radius:50px;
  padding:6px 16px;font-size:1.4rem;font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,.2);
  min-width:80px;text-align:center;
  display:flex;align-items:center;gap:6px;
}
#combo-box{
  background:linear-gradient(135deg,#FDD835,#F9A825);
  color:#3E2723;border-radius:50px;
  padding:5px 12px;font-size:1.1rem;font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
  display:none;
}
#combo-box.show{display:block;animation:comboPop .3s;}
@keyframes comboPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

/* timer */
#timer-wrap{flex:1;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
#timer-label{font-size:1.2rem;font-weight:900;color:#1a1a1a;}
#timer-bar-bg{
  width:100%;max-width:160px;height:12px;
  background:rgba(0,0,0,.15);border-radius:10px;overflow:hidden;
}
#timer-bar{
  height:100%;width:100%;
  background:linear-gradient(90deg,#4CAF50,#8BC34A);
  border-radius:10px;
  transition:width .1s linear, background .5s;
}
#timer-bar.urgent{background:linear-gradient(90deg,#F44336,#FF5722);}

/* ── SCENE ── */
#scene{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:space-around;
}

/* clouds decoration */
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.7;pointer-events:none;}

/* score flash */
#score-flash{
  position:absolute;top:20%;left:50%;
  transform:translateX(-50%);
  font-size:2.8rem;font-weight:900;
  pointer-events:none;z-index:50;
  display:none;
}
#score-flash.show{display:block;animation:scoreFloat 1s ease-out forwards;}
@keyframes scoreFloat{0%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}100%{opacity:0;transform:translateX(-50%) scale(1.4) translateY(-60px)}}

/* ── TRASH ITEM (draggable) ── */
#trash-wrap{
  position:absolute;
  top:30%;left:50%;
  transform:translate(-50%,-50%);
  z-index:30;
  cursor:grab;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  display:none;
}
#trash-wrap.show{display:block;animation:itemEnter .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes itemEnter{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}}
#trash-wrap.dragging{cursor:grabbing;z-index:100;}
#trash-svg{
  width:min(22vw,100px);
  height:min(22vw,100px);
  display:block;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,.25));
  transition:filter .15s;
}
#trash-wrap.dragging #trash-svg{
  filter:drop-shadow(0 12px 24px rgba(0,0,0,.35)) drop-shadow(0 0 20px rgba(255,255,255,.4));
  transform:scale(1.12);
}

/* difficulty badge */
#diff-badge{
  position:absolute;top:-8px;right:-8px;
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:900;color:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}

/* ── BINS ── */
.bin-wrap{
  position:relative;
  flex:1;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:calc(8px + var(--safe-bottom));
  z-index:10;
}
.bin-svg{
  width:min(28vw,110px);
  height:auto;
  display:block;
  transition:transform .15s;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
}
.bin-wrap.highlight .bin-svg{transform:scale(1.12);}
.bin-wrap.correct .bin-svg{animation:binBounce .5s;}
.bin-wrap.wrong .bin-svg{animation:binShake .4s;}
@keyframes binBounce{0%,100%{transform:scale(1)}30%{transform:scale(1.25) translateY(-12px)}60%{transform:scale(.95)}}
@keyframes binShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

.bin-label{
  font-size:1.6rem;margin-top:4px;
  text-align:center;line-height:1;
}

/* bin highlight ring */
.bin-wrap.highlight::after{
  content:'';position:absolute;
  inset:-6px;border-radius:12px;
  border:4px solid rgba(255,255,255,.9);
  animation:ringPulse .6s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:1;
}
@keyframes ringPulse{0%{opacity:.5;transform:scale(.97)}100%{opacity:1;transform:scale(1.04)}}

/* particles */
.particle{
  position:absolute;
  pointer-events:none;z-index:60;
  border-radius:50%;
  animation:partFly linear forwards;
}
@keyframes partFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:var(--dx) scale(0)}}

/* wrong flash overlay */
#wrong-flash{
  position:fixed;inset:0;z-index:80;
  background:rgba(244,67,54,.25);
  pointer-events:none;opacity:0;
  transition:opacity .1s;
}
#wrong-flash.on{opacity:1;}

/* ── START / END SCREENS ── */
.screen{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;
  background:radial-gradient(ellipse at center,rgba(67,160,71,.95),rgba(20,60,20,.98));
  transition:opacity .5s;
}
.screen.hidden{opacity:0;pointer-events:none;}
.screen-title{font-size:2.6rem;font-weight:900;color:#FFD700;text-shadow:0 3px 10px rgba(0,0,0,.4);text-align:center;}
.screen-sub{font-size:1.1rem;color:rgba(255,255,255,.85);text-align:center;max-width:300px;}
.big-btn{
  background:linear-gradient(135deg,#FFD700,#F9A825);
  border:none;border-radius:50px;
  padding:16px 40px;font-size:2rem;
  cursor:pointer;color:#3E2723;font-weight:900;
  box-shadow:0 6px 0 #E65100, 0 8px 20px rgba(0,0,0,.3);
  transition:transform .1s,box-shadow .1s;
}
.big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #E65100;}

#end-score{font-size:3.5rem;font-weight:900;color:#FFD700;text-shadow:0 0 30px rgba(255,215,0,.6);}
#end-stars{font-size:2.5rem;letter-spacing:6px;}
#end-msg{font-size:1.2rem;color:#C8E6C9;text-align:center;max-width:280px;}

/* bin labels */
#bin-y .bin-svg{ }
#bin-b .bin-svg{ }
#bin-g .bin-svg{ }

/* confetti */
.cpiece{position:fixed;pointer-events:none;z-index:300;animation:cfall linear forwards;}
@keyframes cfall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(540deg)}}

/* flash */
#gflash{position:fixed;inset:0;z-index:190;background:#fff;opacity:0;pointer-events:none;transition:opacity .1s;}
#gflash.on{opacity:.5;}
</style>
</head>
<body>

// ══════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════
const GAME_DURATION = 180; // seconds
let score=0, combo=0, timeLeft=GAME_DURATION;
let timerInterval=null, gameActive=false;
let currentItem=null;
let dragActive=false, dragStartX=0, dragStartY=0, origX=0, origY=0;
let itemQueue=[];

const trashWrap = document.getElementById('trash-wrap');
const trashSvg  = document.getElementById('trash-svg');
const diffBadge = document.getElementById('diff-badge');
const scoreVal  = document.getElementById('score-val');
const comboBox  = document.getElementById('combo-box');
const comboVal  = document.getElementById('combo-val');
const timerLabel= document.getElementById('timer-label');
const timerBar  = document.getElementById('timer-bar');
const scoreFlash= document.getElementById('score-flash');

// ══════════════════════════════════════════════════════
// GAME FLOW
// ══════════════════════════════════════════════════════
function startGame(){
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  score=0; combo=0; timeLeft=GAME_DURATION;
  gameActive=true;
  scoreVal.textContent='0';
  comboBox.classList.remove('show');
  timerBar.classList.remove('urgent');
  timerBar.style.width='100%';
  itemQueue=shuffleItems();
  clearInterval(timerInterval);
  timerInterval=setInterval(tick,100);
  nextItem();
}

function tick(){
  timeLeft=Math.max(0,timeLeft-.1);
  const pct=timeLeft/GAME_DURATION;
  timerBar.style.width=(pct*100)+'%';
  if(pct<.25) timerBar.classList.add('urgent');
  const mins=Math.floor(timeLeft/60);
  const secs=Math.floor(timeLeft%60);
  timerLabel.textContent=`${mins}:${secs.toString().padStart(2,'0')}`;
  if(timeLeft<=0) endGame();
}

function endGame(){
  clearInterval(timerInterval);
  gameActive=false;
  trashWrap.classList.remove('show');
  trashWrap.style.display='none';
  // clear bin highlights
  document.querySelectorAll('.bin-wrap').forEach(b=>{b.classList.remove('highlight','correct','wrong');});

  setTimeout(()=>{
    const stars = score>=80?'⭐⭐⭐':score>=40?'⭐⭐':score>=15?'⭐':'';
    const msg = score>=80?'Incrível! És uma campeã da reciclagem! 🌍':
                score>=40?'Muito bem! Continua assim! 💪':
                score>=15?'Boa tentativa! Pratica mais! 🌱':
                'Continua a tentar! Consegues! 🌿';
    document.getElementById('end-score').textContent=score+' pts';
    document.getElementById('end-stars').textContent=stars||'🌱';
    document.getElementById('end-msg').textContent=msg;
    document.getElementById('end-screen').classList.remove('hidden');
    if(score>=40) launchConfetti();
  },400);
}

// ══════════════════════════════════════════════════════
// ITEMS
// ══════════════════════════════════════════════════════
function shuffleItems(){
  // create infinite-ish pool by repeating and shuffling
  const pool=[];
  for(let i=0;i<6;i++) pool.push(...ITEMS);
  return pool.sort(()=>Math.random()-.5);
}

function nextItem(){
  if(!gameActive) return;
  if(itemQueue.length<3) itemQueue.push(...shuffleItems());
  currentItem=itemQueue.shift();

  // difficulty-based timing — harder items show for less time as game progresses
  const elapsed=(GAME_DURATION-timeLeft)/GAME_DURATION;

  // render
  trashSvg.innerHTML=currentItem.svg;
  diffBadge.textContent=currentItem.pts===1?'':'★'.repeat(currentItem.pts);
  diffBadge.style.background=currentItem.pts===1?'#66BB6A':currentItem.pts===2?'#FFA000':'#E53935';
  diffBadge.style.display=currentItem.pts>1?'flex':'none';

  // reset position to centre
  trashWrap.style.left='50%';
  trashWrap.style.top='38%';
  trashWrap.style.transform='translate(-50%,-50%)';
  trashWrap.classList.remove('show','dragging');
  trashWrap.style.display='block';
  void trashWrap.offsetWidth;
  trashWrap.classList.add('show');
}

// ══════════════════════════════════════════════════════
// DRAG
// ══════════════════════════════════════════════════════
function getPos(e){ return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY}; }

trashWrap.addEventListener('mousedown', startDrag);
trashWrap.addEventListener('touchstart', startDrag, {passive:false});

function startDrag(e){
  if(!gameActive||!currentItem) return;
  e.preventDefault();
  dragActive=true;
  trashWrap.classList.add('dragging');
  const pos=getPos(e);
  const r=trashWrap.getBoundingClientRect();
  dragStartX=pos.x; dragStartY=pos.y;
  origX=r.left+r.width/2; origY=r.top+r.height/2;
}

window.addEventListener('mousemove', onDrag);
window.addEventListener('touchmove', onDrag, {passive:false});
window.addEventListener('mouseup',   endDrag);
window.addEventListener('touchend',  endDrag);

function onDrag(e){
  if(!dragActive) return;
  e.preventDefault();
  const pos=getPos(e);
  const dx=pos.x-dragStartX, dy=pos.y-dragStartY;
  trashWrap.style.left=(origX+dx)+'px';
  trashWrap.style.top =(origY+dy)+'px';
  trashWrap.style.transform='translate(-50%,-50%)';

  // highlight nearest bin
  const bins=document.querySelectorAll('.bin-wrap');
  bins.forEach(b=>{
    const r=b.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const dist=Math.hypot(pos.x-cx,pos.y-cy);
    b.classList.toggle('highlight', dist<r.width*.9);
  });
}

function endDrag(e){
  if(!dragActive) return;
  dragActive=false;
  trashWrap.classList.remove('dragging');
  document.querySelectorAll('.bin-wrap').forEach(b=>b.classList.remove('highlight'));

  const pos=e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};

  // check which bin (if any)
  let droppedBin=null;
  document.querySelectorAll('.bin-wrap').forEach(b=>{
    const r=b.getBoundingClientRect();
    if(pos.x>=r.left&&pos.x<=r.right&&pos.y>=r.top&&pos.y<=r.bottom){
      droppedBin=b;
    }
  });

  if(!droppedBin){
    // snapped back
    trashWrap.style.left='50%';
    trashWrap.style.top='38%';
    trashWrap.style.transform='translate(-50%,-50%)';
    trashWrap.style.transition='left .3s,top .3s';
    setTimeout(()=>trashWrap.style.transition='',350);
    return;
  }

  // evaluate
  const droppedBinType=droppedBin.dataset.bin;
  if(droppedBinType===currentItem.bin){
    onCorrect(droppedBin, pos);
  } else {
    onWrong(droppedBin);
  }
}

// ══════════════════════════════════════════════════════
// FEEDBACK
// ══════════════════════════════════════════════════════
function onCorrect(binEl, pos){
  combo++;
  const multiplier=combo>=5?3:combo>=3?2:1;
  const pts=currentItem.pts*multiplier;
  score+=pts;
  scoreVal.textContent=score;

  // combo display
  comboVal.textContent=multiplier;
  if(multiplier>1){
    comboBox.classList.remove('show'); void comboBox.offsetWidth; comboBox.classList.add('show');
  }

  // score flash
  scoreFlash.textContent='+'+pts+(multiplier>1?' 🔥':'');
  scoreFlash.style.color=multiplier>1?'#FFD700':'#4CAF50';
  scoreFlash.classList.remove('show'); void scoreFlash.offsetWidth; scoreFlash.classList.add('show');

  // bin bounce
  binEl.classList.remove('correct'); void binEl.offsetWidth; binEl.classList.add('correct');
  setTimeout(()=>binEl.classList.remove('correct'),500);

  // particles from bin
  spawnParticles(binEl);

  // hide item
  trashWrap.style.display='none';
  setTimeout(nextItem, 350);
}

function onWrong(binEl){
  combo=0;
  comboBox.classList.remove('show');

  // bin shake
  binEl.classList.remove('wrong'); void binEl.offsetWidth; binEl.classList.add('wrong');
  setTimeout(()=>binEl.classList.remove('wrong'),400);

  // red flash
  const wf=document.getElementById('wrong-flash');
  wf.classList.add('on');
  setTimeout(()=>wf.classList.remove('on'),200);

  // bounce item back
  trashWrap.style.left='50%';
  trashWrap.style.top='38%';
  trashWrap.style.transform='translate(-50%,-50%)';
  trashWrap.style.transition='left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1)';
  setTimeout(()=>trashWrap.style.transition='',400);
}

function spawnParticles(binEl){
  const r=binEl.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top;
  const cols=['#FFD700','#4CAF50','#2196F3','#F48FB1','#fff','#FF9800'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=6+Math.random()*10;
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*80;
    const dx=Math.cos(angle)*dist, dy=Math.sin(angle)*dist-60;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      --dx:translate(${dx}px,${dy}px);
      animation-duration:${.5+Math.random()*.5}s;
      animation-delay:${Math.random()*.1}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function launchConfetti(){
  const cols=['#4CAF50','#FDD835','#1E88E5','#F48FB1','#fff','#FF9800'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    const sz=8+Math.random()*12;
    el.style.cssText=`width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'};
      left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

// PWA
if('serviceWorker' in navigator){
  const sw=`const C='reciclar-v1';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})));
}
