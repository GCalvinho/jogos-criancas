<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Piratas">
<meta name="theme-color" content="#1565C0">
<title>🏴‍☠️ Piratas!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d2b4e;touch-action:none;user-select:none;}
#c{position:fixed;inset:0;width:100%;height:100%;touch-action:none;}
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  padding-top:calc(8px + env(safe-area-inset-top,0px));
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(6px);
  pointer-events:none;
}
#score-hud{background:linear-gradient(135deg,#B8860B,#7a5900);color:#FFD700;
  border-radius:50px;padding:5px 14px;font:900 1.3rem/1 'Helvetica Neue',Arial;
  box-shadow:0 3px 10px rgba(0,0,0,.4);white-space:nowrap;}
#hs-hud{font:700 .85rem/1 Arial;color:rgba(255,255,255,.55);white-space:nowrap;margin-left:auto;}
#danger-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;max-width:150px;}
#danger-lbl{font:700 .68rem/1 Arial;color:#FF5252;letter-spacing:1px;}
#dbar-bg{width:100%;height:10px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;}
#dbar{height:100%;width:0%;border-radius:6px;}
#reload-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
#reload-lbl{font:700 .68rem/1 Arial;color:#80DEEA;letter-spacing:1px;}
#rbar-bg{width:52px;height:10px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;}
#rbar{height:100%;width:100%;background:linear-gradient(90deg,#26C6DA,#00BCD4);border-radius:6px;}
.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:radial-gradient(ellipse at 50% 40%,rgba(13,43,78,.97),rgba(2,8,20,.99));
  transition:opacity .3s;}
.screen.off{opacity:0;pointer-events:none;}
.s-emoji{font-size:5rem;line-height:1;}
.s-title{font:900 2.2rem/1 'Helvetica Neue',Arial;color:#FFD700;text-align:center;
  text-shadow:0 0 20px rgba(255,215,0,.5);}
.s-sub{font:400 .95rem/1.5 Arial;color:rgba(255,255,255,.75);text-align:center;max-width:280px;}
.big-btn{background:linear-gradient(135deg,#FFD700,#FFA000);border:none;border-radius:50px;
  padding:14px 36px;font:900 1.7rem/1 'Helvetica Neue',Arial;color:#3E1A00;cursor:pointer;
  box-shadow:0 5px 0 #E65100;transition:transform .1s,box-shadow .1s;}
.big-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #E65100;}
#lb,#lb2{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:10px 18px;width:min(300px,86vw);}
.lb-t{font:700 .8rem/1 Arial;color:#FFD700;margin-bottom:8px;text-align:center;letter-spacing:2px;}
.lb-r{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.07);font:600 .95rem/1 Arial;color:#fff;}
.lb-r:last-child{border:none;}
.lb-m{width:24px;text-align:center;font-size:1.1rem;}
.lb-d{flex:1;color:rgba(255,255,255,.7);font-size:.85rem;}
.lb-p{color:#FFD700;font-weight:900;}
.lb-r.hi{background:rgba(255,215,0,.08);border-radius:6px;}
#go-score{font:900 2.8rem/1 'Helvetica Neue',Arial;color:#FFD700;}
#go-msg{font:400 1rem/1.4 Arial;color:#B3E5FC;text-align:center;max-width:260px;}
</style>
</head>
<body>
<div id="hud">
  <div id="score-hud">🏴‍☠️ <span id="sv">0</span></div>
  <div id="danger-wrap">
    <div id="danger-lbl">⚠️ PERIGO</div>
    <div id="dbar-bg"><div id="dbar"></div></div>
  </div>
  <div id="reload-wrap">
    <div id="reload-lbl">💣 CARGA</div>
    <div id="rbar-bg"><div id="rbar"></div></div>
  </div>
  <div id="hs-hud">🏆 <span id="hsv">0</span></div>
</div>
<canvas id="c"></canvas>

<div class="screen" id="ss">
  <div class="s-emoji">🏴‍☠️</div>
  <div class="s-title">Piratas do Canhão!</div>
  <div class="s-sub">Arrasta o dedo para apontar.<br>Larga para disparar! 💣<br><br>
    🚢 Grande = 1pt &nbsp;·&nbsp; ⛵ Médio = 2pts &nbsp;·&nbsp; 🛶 Pequeno = 3pts<br><br>
    ⚠️ Não deixes passar muitos barcos!</div>
  <button class="big-btn" onclick="startGame()">⚓ Jogar</button>
  <div id="lb"></div>
</div>

<div class="screen off" id="gs">
  <div class="s-emoji">💀</div>
  <div class="s-title">Os barcos fugiram!</div>
  <div id="go-score">0 pts</div>
  <div id="go-msg"></div>
  <button class="big-btn" onclick="startGame()">🔄 Outra vez</button>
  <div id="lb2"></div>
</div>

<script>
// ─── CANVAS ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1, CANNON_Y = 0;

function resize() {
  DPR = window.devicePixelRatio || 1;
  W   = window.innerWidth;
  H   = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
  CANNON_Y = H - 90;
}
window.addEventListener('resize', resize);
resize();

// ─── EMOJI — single font set, no per-frame font change flicker ──
// We pre-size all emoji draws with one font per size bucket
const FONT_CACHE = {};
function setFont(size) {
  const key = size + '';
  if (!FONT_CACHE[key]) FONT_CACHE[key] = `${size}px serif`;
  if (ctx.font !== FONT_CACHE[key]) ctx.font = FONT_CACHE[key];
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
}
function em(e, x, y, size) {
  setFont(size);
  ctx.fillText(e, x, y);
}

// ─── LEADERBOARD ───────────────────────────────────────────────
const LB_KEY = 'piratas_v2';
function getBoard() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; } }
function saveScore(pts) {
  let b = getBoard();
  b.push({ pts, d: new Date().toLocaleDateString('pt-PT') });
  b.sort((a, b) => b.pts - a.pts);
  b = b.slice(0, 5);
  localStorage.setItem(LB_KEY, JSON.stringify(b));
  return b;
}
function renderLB(id, hi = -1) {
  const b = getBoard();
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  document.getElementById(id).innerHTML =
    `<div class="lb-t">🏆 MELHORES</div>` +
    (b.length === 0
      ? `<div style="text-align:center;color:rgba(255,255,255,.35);font-size:.85rem;padding:6px">Ainda sem recordes</div>`
      : b.map((r, i) => `<div class="lb-r ${r.pts===hi&&i===0?'hi':''}">
          <span class="lb-m">${medals[i]}</span>
          <span class="lb-d">${r.d}</span>
          <span class="lb-p">${r.pts} pts</span></div>`).join(''));
}

// ─── CONSTANTS ─────────────────────────────────────────────────
const DANGER_SECS  = 10;   // seconds of no sink → game over
const RELOAD_FRAMES= 50;   // frames between shots (~0.8s at 60fps)
const BALL_SPEED   = 9;
const INIT_SHIP_INTERVAL = 220; // frames between ship spawns initially
const MIN_SHIP_INTERVAL  = 90;
const INIT_SHIP_SPEED    = 0.8; // pixels per frame initially
const MAX_SHIP_SPEED     = 2.2;

// Ship types — sizes tuned for visual clarity, not too fast
const SHIP_TYPES = [
  { emoji:'🚢', ew:72, eh:40, pts:1, hp:3, speedMult:0.8  },
  { emoji:'⛵', ew:52, eh:34, pts:2, hp:2, speedMult:1.1  },
  { emoji:'🛶', ew:38, eh:28, pts:3, hp:1, speedMult:1.4  },
];

// ─── GAME STATE ────────────────────────────────────────────────
let score, gameRunning, frame;
let cannonAngle;
let aiming, aimX, aimY;
let canFire, reloadCD;
let dangerCD;
let ships, balls, particles, smokes;
let spawnInterval, spawnCD, baseSpeed;

// ─── INPUT ─────────────────────────────────────────────────────
function clientToGame(e) {
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX, y: src.clientY };
}
function setAim(x, y) {
  if (!gameRunning) return;
  const dx = x - W / 2;
  const dy = y - CANNON_Y;
  let a = Math.atan2(dy, dx);
  // clamp to upper half only (don't let cannon point down)
  if (a > -0.05 && a < Math.PI + 0.05) {
    a = (Math.abs(a - Math.PI/2) < Math.PI/2) ? Math.PI + 0.05 : -0.05;
  }
  cannonAngle = a;
}
canvas.addEventListener('touchstart',  e => { e.preventDefault(); const p=clientToGame(e); aiming=true; aimX=p.x; aimY=p.y; setAim(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove',   e => { e.preventDefault(); const p=clientToGame(e); aimX=p.x; aimY=p.y; setAim(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend',    e => { e.preventDefault(); if(aiming&&gameRunning) fire(); aiming=false; }, {passive:false});
canvas.addEventListener('touchcancel', e => { aiming=false; }, {passive:false});
canvas.addEventListener('mousedown',   e => { const p=clientToGame(e); aiming=true; setAim(p.x,p.y); });
canvas.addEventListener('mousemove',   e => { if(!aiming) return; setAim(e.clientX,e.clientY); });
canvas.addEventListener('mouseup',     e => { if(aiming&&gameRunning) fire(); aiming=false; });

function fire() {
  if (!canFire) return;
  canFire  = false;
  reloadCD = RELOAD_FRAMES;
  const ox = W/2 + Math.cos(cannonAngle)*55;
  const oy = CANNON_Y + Math.sin(cannonAngle)*55;
  balls.push({ x:ox, y:oy, vx:Math.cos(cannonAngle)*BALL_SPEED, vy:Math.sin(cannonAngle)*BALL_SPEED, trail:[] });
  // smoke
  for (let i=0;i<6;i++) {
    const spread = (Math.random()-.5)*.8;
    smokes.push({ x:ox, y:oy,
      vx: Math.cos(cannonAngle)*(0.8+Math.random()*.5)+spread,
      vy: Math.sin(cannonAngle)*(0.8+Math.random()*.5)+spread,
      life:28+Math.random()*12|0, maxLife:40, r:7+Math.random()*8|0 });
  }
}

// ─── SPAWN ─────────────────────────────────────────────────────
function spawnShip() {
  const t = SHIP_TYPES[Math.floor(Math.random()*SHIP_TYPES.length)];
  const fromRight = Math.random() < 0.5;
  // 3 lanes in upper portion of screen
  const lane = Math.floor(Math.random()*3);
  const y = 95 + lane * 68 + Math.random()*18;
  const spd = baseSpeed * t.speedMult * (fromRight ? -1 : 1);
  return { ...t, x: fromRight ? W+80 : -80, y, vx:spd,
    hp:t.hp, maxHp:t.hp, sinking:false, sinkT:0, hitFlash:0 };
}

// ─── PARTICLES ─────────────────────────────────────────────────
function burst(x, y, emojis, n=8) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 1.5+Math.random()*3.5;
    particles.push({ x, y,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-1.5,
      e: emojis[Math.floor(Math.random()*emojis.length)],
      life:32+Math.random()*18|0, maxLife:50, size:16+Math.random()*10|0 });
  }
}

// ─── START ─────────────────────────────────────────────────────
function startGame() {
  document.getElementById('ss').classList.add('off');
  document.getElementById('gs').classList.add('off');
  score=0; gameRunning=true; frame=0;
  cannonAngle = -Math.PI/2;
  aiming=false; canFire=true; reloadCD=0;
  dangerCD = DANGER_SECS * 60;
  ships=[]; balls=[]; particles=[]; smokes=[];
  spawnInterval = INIT_SHIP_INTERVAL;
  spawnCD = 80; // first ship appears quickly
  baseSpeed = INIT_SHIP_SPEED;
  document.getElementById('sv').textContent = '0';
  document.getElementById('rbar').style.width = '100%';
  document.getElementById('dbar').style.width = '0%';
  const board = getBoard();
  document.getElementById('hsv').textContent = board.length ? board[0].pts : 0;
}

// ─── DRAW WATER + SKY ──────────────────────────────────────────
let waveT = 0;
function drawWorld() {
  waveT += 0.012;
  // sky
  const sky = ctx.createLinearGradient(0,0,0,H*0.52);
  sky.addColorStop(0,'#06111f'); sky.addColorStop(1,'#0d3b6e');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
  // moon
  ctx.save(); ctx.shadowColor='#fffde7'; ctx.shadowBlur=30;
  em('🌕', W-56, 54, 44);
  ctx.restore();
  // clouds
  em('⛅', W*0.62, H*0.1, 30);
  em('⛅', W*0.28, H*0.07, 24);
  em('🏝️', W*0.1,  H*0.3, 30);

  // water
  const waterY = H*0.30;
  const wg = ctx.createLinearGradient(0,waterY,0,H);
  wg.addColorStop(0,'#0d5a9e'); wg.addColorStop(0.5,'#0a3d6e'); wg.addColorStop(1,'#041428');
  ctx.fillStyle = wg; ctx.fillRect(0,waterY,W,H-waterY);

  // waves — drawn once, no per-pixel globalAlpha changes
  for (let row=0;row<5;row++) {
    const wy = waterY + row*42 + Math.sin(waveT+row)*5;
    ctx.strokeStyle = `rgba(120,200,255,${0.07+row*0.01})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x=0;x<=W;x+=20) {
      const py = wy + Math.sin(x*0.035+waveT+row*0.8)*6;
      x===0 ? ctx.moveTo(x,py) : ctx.lineTo(x,py);
    }
    ctx.stroke();
  }
}

// ─── DRAW CANNON + PIRATE ──────────────────────────────────────
function drawCannon() {
  const cx = W/2, cy = CANNON_Y;

  // rock/platform
  ctx.fillStyle='#3E2723';
  ctx.beginPath(); ctx.ellipse(cx,cy+32,78,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4E342E';
  ctx.beginPath(); ctx.ellipse(cx,cy+28,70,16,0,0,Math.PI*2); ctx.fill();

  // cannon barrel (rotates)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(cannonAngle);
  // barrel
  const bg = ctx.createLinearGradient(0,-7,0,7);
  bg.addColorStop(0,'#9E9E9E'); bg.addColorStop(0.5,'#757575'); bg.addColorStop(1,'#424242');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(6,-7,54,14,4); ctx.fill();
  // muzzle
  ctx.fillStyle='#616161';
  ctx.beginPath(); ctx.ellipse(60,0,8,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#212121';
  ctx.beginPath(); ctx.arc(60,0,5,0,Math.PI*2); ctx.fill();
  // aim line (only while dragging)
  if (aiming) {
    ctx.save();
    ctx.setLineDash([5,10]); ctx.strokeStyle='rgba(255,220,50,.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(68,0); ctx.lineTo(240,0); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  // wheel
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.arc(cx,cy+12,20,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3E2723'; ctx.lineWidth=2.5;
  for (let i=0;i<6;i++) {
    const a=i/6*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy+12); ctx.lineTo(cx+Math.cos(a)*18,cy+12+Math.sin(a)*18); ctx.stroke();
  }
  ctx.fillStyle='#8D6E63'; ctx.beginPath(); ctx.arc(cx,cy+12,5,0,Math.PI*2); ctx.fill();

  // pirate
  em('🏴‍☠️', cx-48, cy-14, 40);
}

// ─── MAIN LOOP ─────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (!gameRunning) return;
  frame++;

  drawWorld();

  // ── Spawn ships ──
  spawnCD--;
  if (spawnCD <= 0) {
    ships.push(spawnShip());
    spawnInterval = Math.max(MIN_SHIP_INTERVAL, spawnInterval - 1.5);
    spawnCD = spawnInterval | 0;
    baseSpeed = Math.min(MAX_SHIP_SPEED, baseSpeed + 0.04);
  }

  // ── Reload ──
  if (!canFire) {
    reloadCD--;
    document.getElementById('rbar').style.width = ((1-reloadCD/RELOAD_FRAMES)*100)+'%';
    if (reloadCD <= 0) { canFire=true; document.getElementById('rbar').style.width='100%'; }
  }

  // ── Danger timer ──
  dangerCD--;
  const dpct = Math.max(0, 1 - dangerCD/(DANGER_SECS*60));
  const dbar = document.getElementById('dbar');
  dbar.style.width = (dpct*100)+'%';
  dbar.style.background = dpct < 0.5
    ? 'linear-gradient(90deg,#FFD700,#FFA000)'
    : dpct < 0.8
    ? 'linear-gradient(90deg,#FFA000,#FF5252)'
    : 'linear-gradient(90deg,#FF5252,#b71c1c)';
  if (dangerCD <= 0) { endGame(); return; }

  // ── Ships ──
  ships = ships.filter(s => {
    if (!s.sinking) s.x += s.vx;
    else { s.sinkT++; s.y += 1.2; }
    if (s.x > W+120 || s.x < -120) return false;
    if (s.sinkT > 55) return false;

    ctx.save();
    if (s.sinking) {
      ctx.globalAlpha = Math.max(0, 1 - s.sinkT/55);
      ctx.translate(s.x, s.y);
      ctx.rotate(s.vx > 0 ? s.sinkT*0.035 : -s.sinkT*0.035);
      em(s.emoji, 0, 0, s.ew);
    } else {
      // hit flash: briefly tint red using a red rect underneath
      if (s.hitFlash > 0) {
        s.hitFlash--;
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = '#FF5252';
        ctx.beginPath(); ctx.ellipse(s.x, s.y, s.ew*0.5, s.eh*0.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      em(s.emoji, s.x, s.y, s.ew);
      // HP pips
      for (let i=0;i<s.maxHp;i++) {
        ctx.fillStyle = i < s.hp ? '#FF5252' : 'rgba(255,255,255,.18)';
        ctx.beginPath(); ctx.arc(s.x-(s.maxHp-1)*7+i*14, s.y+s.eh*0.5+10, 5, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
    return true;
  });

  // ── Cannonballs ──
  balls = balls.filter(b => {
    b.trail.push({x:b.x, y:b.y});
    if (b.trail.length > 7) b.trail.shift();
    b.x += b.vx; b.y += b.vy;
    if (b.x<-20||b.x>W+20||b.y<-30||b.y>H+20) return false;

    // trail (no globalAlpha per point — use single fade)
    ctx.save();
    b.trail.forEach((tp, ti) => {
      const a = (ti+1)/b.trail.length;
      ctx.globalAlpha = a * 0.35;
      ctx.fillStyle = '#FF8F00';
      ctx.beginPath(); ctx.arc(tp.x, tp.y, b.r*(a*0.6), 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();

    // ball (solid, no alpha)
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(b.x-2.5, b.y-2.5, b.r*0.38, 0, Math.PI*2); ctx.fill();

    // hit test
    let hit = false;
    ships.forEach(s => {
      if (s.sinking) return;
      if (Math.abs(b.x-s.x) < s.ew*0.5 && Math.abs(b.y-s.y) < s.eh*0.6) {
        s.hp--; s.hitFlash=14;
        burst(b.x, b.y, ['💥','🔥','💢'], 5);
        hit = true;
        if (s.hp <= 0) {
          s.sinking = true;
          score += s.pts;
          document.getElementById('sv').textContent = score;
          dangerCD = DANGER_SECS * 60;
          burst(s.x, s.y, ['💥','🌊','💦'], 10);
          // floating score text
          particles.push({ x:s.x, y:s.y-20, vx:0, vy:-1,
            e:`+${s.pts}`, life:50, maxLife:50, size:26, isText:true });
        }
      }
    });
    return !hit;
  });

  // ── Smoke ──
  smokes = smokes.filter(s => {
    s.x+=s.vx; s.y+=s.vy; s.life--;
    ctx.save();
    ctx.globalAlpha = (s.life/s.maxLife)*0.4;
    ctx.fillStyle='#9E9E9E';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*(1.2-s.life/s.maxLife*0.4),0,Math.PI*2); ctx.fill();
    ctx.restore();
    return s.life > 0;
  });

  // ── Particles ──
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--;
    ctx.save();
    ctx.globalAlpha = p.life/p.maxLife;
    if (p.isText) {
      ctx.font = `900 ${p.size}px 'Helvetica Neue',Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#FFD700';
      ctx.fillText(p.e, p.x, p.y);
    } else {
      em(p.e, p.x, p.y, p.size);
    }
    ctx.restore();
    return p.life > 0;
  });

  // ── Cannon on top ──
  drawCannon();

  // ── Aim hint ──
  if (!aiming && gameRunning && Math.floor(frame/50)%2===0) {
    ctx.save();
    ctx.globalAlpha=0.45; ctx.fillStyle='#fff';
    ctx.font='700 0.78rem Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👆 Arrasta para apontar · Larga para disparar', W/2, CANNON_Y-72);
    ctx.restore();
  }
}

// ─── END GAME ──────────────────────────────────────────────────
function endGame() {
  gameRunning=false; aiming=false;
  const board=saveScore(score);
  document.getElementById('go-score').textContent=score+' pontos';
  const best=board[0]?.pts||0;
  document.getElementById('go-msg').textContent=
    score>=best&&board.length>0?'🏆 Novo recorde! Lendário!':
    score>=25?'⚓ Excelente capitão!':
    score>=10?'🏴‍☠️ Bom trabalho! Continua!':
    '💀 Os barcos escaparam todos!';
  renderLB('lb2',score);
  document.getElementById('hsv').textContent=best;
  document.getElementById('gs').classList.remove('off');
}

// ─── INIT ──────────────────────────────────────────────────────
renderLB('lb');
requestAnimationFrame(loop);
gameRunning=false;

if('serviceWorker' in navigator){
  const sw=`const C='piratas-v2';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})));
}
</script>
