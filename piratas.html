<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Piratas">
<meta name="theme-color" content="#1565C0">
<title>🏴‍☠️ Piratas!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d2b4e;touch-action:none;user-select:none;}
#c{position:fixed;inset:0;width:100%;height:100%;touch-action:none;}

#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  padding-top:calc(8px + env(safe-area-inset-top,0px));
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(6px);
  pointer-events:none;
}
#score-hud{
  background:linear-gradient(135deg,#B8860B,#8B6914);
  color:#FFD700;border-radius:50px;padding:5px 14px;
  font:900 1.3rem/1 'Helvetica Neue',Arial;
  box-shadow:0 3px 10px rgba(0,0,0,.4);
  white-space:nowrap;
}
#hs-hud{font:700 .85rem/1 Arial;color:rgba(255,255,255,.6);white-space:nowrap;}

/* danger bar — fills up when no ship sunk */
#danger-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
#danger-lbl{font:700 .7rem/1 Arial;color:#FF5252;letter-spacing:1px;}
#dbar-bg{width:100%;max-width:140px;height:10px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;}
#dbar{height:100%;width:0%;background:linear-gradient(90deg,#FFD700,#FF5252);border-radius:6px;transition:background .3s;}

/* reload bar */
#reload-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
#reload-lbl{font:700 .7rem/1 Arial;color:#80DEEA;letter-spacing:1px;}
#rbar-bg{width:60px;height:10px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;}
#rbar{height:100%;width:100%;background:linear-gradient(90deg,#26C6DA,#00BCD4);border-radius:6px;}

.screen{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:radial-gradient(ellipse at 50% 40%,rgba(13,43,78,.97),rgba(2,8,20,.99));
  transition:opacity .3s;
}
.screen.off{opacity:0;pointer-events:none;}
.s-emoji{font-size:5rem;line-height:1;}
.s-title{font:900 2.2rem/1 'Helvetica Neue',Arial;color:#FFD700;text-align:center;text-shadow:0 0 20px rgba(255,215,0,.5);}
.s-sub{font:400 .95rem/1.5 Arial;color:rgba(255,255,255,.75);text-align:center;max-width:280px;}
.big-btn{
  background:linear-gradient(135deg,#FFD700,#FFA000);
  border:none;border-radius:50px;padding:14px 36px;
  font:900 1.7rem/1 'Helvetica Neue',Arial;color:#3E1A00;cursor:pointer;
  box-shadow:0 5px 0 #E65100;transition:transform .1s,box-shadow .1s;
}
.big-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #E65100;}
#lb,#lb2{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:10px 18px;width:min(300px,86vw);}
.lb-t{font:700 .8rem/1 Arial;color:#FFD700;margin-bottom:8px;text-align:center;letter-spacing:2px;}
.lb-r{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.07);font:600 .95rem/1 Arial;color:#fff;}
.lb-r:last-child{border:none;}
.lb-m{width:24px;text-align:center;font-size:1.1rem;}
.lb-d{flex:1;color:rgba(255,255,255,.7);font-size:.85rem;}
.lb-p{color:#FFD700;font-weight:900;}
.lb-r.hi{background:rgba(255,215,0,.08);border-radius:6px;}
#go-score{font:900 2.8rem/1 'Helvetica Neue',Arial;color:#FFD700;}
#go-msg{font:400 1rem/1.4 Arial;color:#B3E5FC;text-align:center;max-width:260px;}
</style>
</head>
<body>

<div id="hud">
  <div id="score-hud">🏴‍☠️ <span id="sv">0</span></div>
  <div id="danger-wrap">
    <div id="danger-lbl">⚠️ PERIGO</div>
    <div id="dbar-bg"><div id="dbar"></div></div>
  </div>
  <div id="reload-wrap">
    <div id="reload-lbl">💣 CARGA</div>
    <div id="rbar-bg"><div id="rbar"></div></div>
  </div>
  <div id="hs-hud">🏆 <span id="hsv">0</span></div>
</div>

<canvas id="c"></canvas>

<!-- START -->
<div class="screen" id="ss">
  <div class="s-emoji">🏴‍☠️</div>
  <div class="s-title">Piratas do Canhão!</div>
  <div class="s-sub">Arrasta o dedo para apontar o canhão.<br>Larga para disparar!<br><br>
    🚢 Afunda os barcos antes que fujam!<br>⚠️ Se não acertares durante muito tempo, perdes!</div>
  <button class="big-btn" onclick="startGame()">⚓ Jogar</button>
  <div id="lb"></div>
</div>

<!-- GAME OVER -->
<div class="screen off" id="gs">
  <div class="s-emoji">💀</div>
  <div class="s-title">Os barcos fugiram!</div>
  <div id="go-score">0 pts</div>
  <div id="go-msg"></div>
  <button class="big-btn" onclick="startGame()">🔄 Outra vez</button>
  <div id="lb2"></div>
</div>

<script>
// ─── CANVAS ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
let PIRATE_Y; // y position of pirate/cannon base

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
  PIRATE_Y = H - 80;
}
window.addEventListener('resize', resize);
resize();

// ─── EMOJI HELPER ──────────────────────────────────────────
let _efont = '';
function em(e, x, y, size, angle = 0) {
  const f = `${size}px serif`;
  if (f !== _efont) { ctx.font = f; _efont = f; }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillText(e, 0, 0);
    ctx.restore();
  } else {
    ctx.fillText(e, x, y);
  }
}

// ─── LEADERBOARD ───────────────────────────────────────────
const LB_KEY = 'piratas_v1';
function getBoard() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; } }
function saveScore(pts) {
  let b = getBoard();
  b.push({ pts, d: new Date().toLocaleDateString('pt-PT') });
  b.sort((a, b) => b.pts - a.pts);
  b = b.slice(0, 5);
  localStorage.setItem(LB_KEY, JSON.stringify(b));
  return b;
}
function renderLB(id, hi = -1) {
  const b = getBoard();
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  document.getElementById(id).innerHTML =
    `<div class="lb-t">🏆 MELHORES</div>` +
    (b.length === 0
      ? `<div style="text-align:center;color:rgba(255,255,255,.35);font-size:.85rem;padding:6px">Ainda sem recordes</div>`
      : b.map((r, i) => `<div class="lb-r ${r.pts===hi&&i===0?'hi':''}">
          <span class="lb-m">${medals[i]}</span>
          <span class="lb-d">${r.d}</span>
          <span class="lb-p">${r.pts} pts</span>
         </div>`).join(''));
}

// ─── GAME STATE ────────────────────────────────────────────
const DANGER_TIME = 8;   // seconds before game over if no hit
const RELOAD_TIME = 45;  // frames between shots

let score, gameRunning, t;
let cannonAngle;          // radians — 0 = straight up
let aiming, aimX, aimY;  // drag state
let canFire, reloadCD;
let dangerTimer;          // counts down to game over
let ships, balls, particles, splashes, smokes;
let shipSpawnCD, shipSpawnInterval, shipSpeed;

// ─── INPUT ─────────────────────────────────────────────────
function getXY(e) {
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX, y: src.clientY };
}

canvas.addEventListener('touchstart',  e => { e.preventDefault(); const p=getXY(e); aiming=true; aimX=p.x; aimY=p.y; updateAim(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove',   e => { e.preventDefault(); const p=getXY(e); aimX=p.x; aimY=p.y; updateAim(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend',    e => { e.preventDefault(); if(aiming && gameRunning){ fire(); } aiming=false; }, {passive:false});
canvas.addEventListener('touchcancel', e => { aiming=false; }, {passive:false});
canvas.addEventListener('mousedown',   e => { const p=getXY(e); aiming=true; aimX=p.x; aimY=p.y; updateAim(p.x,p.y); });
canvas.addEventListener('mousemove',   e => { if(!aiming) return; aimX=e.clientX; aimY=e.clientY; updateAim(e.clientX,e.clientY); });
canvas.addEventListener('mouseup',     e => { if(aiming && gameRunning){ fire(); } aiming=false; });

function updateAim(x, y) {
  if (!gameRunning) return;
  // angle from cannon base to finger
  const dx = x - W / 2;
  const dy = y - PIRATE_Y;
  cannonAngle = Math.atan2(dy, dx);
  // clamp: only allow firing upward (left side -π to 0, right side 0 to π, but only upper half)
  // allow full left-right range but clamp so never fires downward
  if (cannonAngle > -0.1 && cannonAngle < Math.PI + 0.1) {
    // pointing down — clamp to nearest side
    cannonAngle = cannonAngle < Math.PI / 2 ? -0.1 : Math.PI + 0.1;
  }
}

function fire() {
  if (!canFire || !gameRunning) return;
  canFire = false;
  reloadCD = RELOAD_TIME;

  const SPEED = 11;
  const cx = W / 2, cy = PIRATE_Y - 10;
  balls.push({
    x: cx + Math.cos(cannonAngle) * 35,
    y: cy + Math.sin(cannonAngle) * 35,
    vx: Math.cos(cannonAngle) * SPEED,
    vy: Math.sin(cannonAngle) * SPEED,
    r: 11,
    trail: []
  });

  // smoke puff at muzzle
  const mx = cx + Math.cos(cannonAngle) * 50;
  const my = cy + Math.sin(cannonAngle) * 50;
  for (let i = 0; i < 5; i++) {
    smokes.push({
      x: mx, y: my,
      vx: Math.cos(cannonAngle) * (0.5 + Math.random()) + (Math.random() - .5),
      vy: Math.sin(cannonAngle) * (0.5 + Math.random()) + (Math.random() - .5),
      life: 22 + Math.random() * 12 | 0,
      maxLife: 34,
      r: 8 + Math.random() * 10 | 0
    });
  }
}

// ─── SHIP FACTORY ──────────────────────────────────────────
const SHIP_TYPES = [
  { size: 'L', emoji: '🚢', w: 80, h: 44, pts: 1, hp: 3, speed: 0.9 },
  { size: 'M', emoji: '⛵', w: 54, h: 36, pts: 2, hp: 2, speed: 1.3 },
  { size: 'S', emoji: '🛶', w: 38, h: 28, pts: 3, hp: 1, speed: 1.7 },
];

function spawnShip() {
  const type = SHIP_TYPES[Math.random() * SHIP_TYPES.length | 0];
  const fromRight = Math.random() < 0.5;
  const row = Math.floor(Math.random() * 3); // 3 lanes
  const y = 80 + row * 70 + Math.random() * 20;
  const spd = (type.speed + (score / 30) * 0.4) * (fromRight ? -1 : 1);
  return {
    ...type,
    x: fromRight ? W + type.w : -type.w,
    y,
    vx: spd,
    hp: type.hp,
    maxHp: type.hp,
    sinking: false,
    sinkTimer: 0,
    hitFlash: 0,
  };
}

// ─── PARTICLES ─────────────────────────────────────────────
function burst(x, y, emojis, n = 8, spread = 4) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + Math.random();
    const spd = 1.5 + Math.random() * spread;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      e: emojis[Math.random() * emojis.length | 0],
      life: 30 + Math.random() * 20 | 0,
      maxLife: 50,
      size: 16 + Math.random() * 12 | 0
    });
  }
}

// ─── WATER ─────────────────────────────────────────────────
// precomputed wave points
let waveOff = 0;
function drawWater() {
  waveOff += 0.015;
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, '#0a1628');
  sky.addColorStop(1, '#0d3b6e');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // sun / moon glow top right
  ctx.save();
  ctx.shadowColor = '#FFE082'; ctx.shadowBlur = 40;
  em('🌕', W - 55, 55, 46);
  ctx.restore();

  // distant island / coast hint
  em('🏝️', W * 0.12, H * 0.28, 32);
  em('⛅', W * 0.6, H * 0.12, 28);
  em('⛅', W * 0.3, H * 0.08, 22);

  // water body
  const waterTop = H * 0.30;
  const water = ctx.createLinearGradient(0, waterTop, 0, H);
  water.addColorStop(0, '#0d4f8a');
  water.addColorStop(0.4, '#0a3d6e');
  water.addColorStop(1, '#051d38');
  ctx.fillStyle = water;
  ctx.fillRect(0, waterTop, W, H - waterTop);

  // wave lines
  for (let row = 0; row < 6; row++) {
    const wy = waterTop + row * 38 + Math.sin(waveOff + row) * 4;
    ctx.strokeStyle = `rgba(100,180,255,${0.08 + row * 0.01})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 18) {
      const y = wy + Math.sin(x * 0.04 + waveOff + row * 0.7) * 5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // foam/sparkle on water
  if (t % 8 === 0) {
    ctx.fillStyle = 'rgba(255,255,255,.15)';
    for (let i = 0; i < 4; i++) {
      const fx = Math.random() * W;
      const fy = waterTop + Math.random() * (H - waterTop - 60);
      ctx.beginPath(); ctx.ellipse(fx, fy, 12, 3, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// ─── PIRATE + CANNON ───────────────────────────────────────
function drawPirate() {
  const cx = W / 2, cy = PIRATE_Y;

  // platform / rock
  ctx.fillStyle = '#3E2723';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 30, 80, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4E342E';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 26, 74, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // cannon barrel — rotates with cannonAngle
  const blen = 50, bw = 14;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(cannonAngle);
  // barrel body
  const bgrad = ctx.createLinearGradient(0, -bw/2, 0, bw/2);
  bgrad.addColorStop(0, '#616161');
  bgrad.addColorStop(0.5, '#9E9E9E');
  bgrad.addColorStop(1, '#424242');
  ctx.fillStyle = bgrad;
  ctx.beginPath();
  ctx.roundRect(8, -bw/2, blen, bw, 4);
  ctx.fill();
  // muzzle ring
  ctx.fillStyle = '#757575';
  ctx.beginPath();
  ctx.ellipse(8 + blen, 0, 6, bw/2 + 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // cannon ball inside
  ctx.fillStyle = '#212121';
  ctx.beginPath();
  ctx.arc(8 + blen - 6, 0, 5, 0, Math.PI * 2);
  ctx.fill();
  // aim line (when dragging)
  if (aiming && gameRunning) {
    ctx.save();
    ctx.setLineDash([6, 10]);
    ctx.strokeStyle = 'rgba(255,220,50,.55)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(8 + blen, 0);
    ctx.lineTo(8 + blen + 180, 0);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  ctx.restore();

  // cannon wheel
  ctx.fillStyle = '#5D4037';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 10, 22, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3E2723'; ctx.lineWidth = 3;
  for (let i = 0; i < 6; i++) {
    const a = i / 6 * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy + 10);
    ctx.lineTo(cx + Math.cos(a) * 20, cy + 10 + Math.sin(a) * 20);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx, cy + 10, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#8D6E63'; ctx.fill();

  // pirate emoji on platform
  em('🏴‍☠️', cx - 45, cy - 16, 38);
  // cannon emoji label
  em('💣', cx + 44, cy - 18, 20);
}

// ─── START / LOOP ──────────────────────────────────────────
function startGame() {
  document.getElementById('ss').classList.add('off');
  document.getElementById('gs').classList.add('off');
  score = 0; t = 0; gameRunning = true;
  cannonAngle = -Math.PI / 2; // straight up
  aiming = false; canFire = true; reloadCD = 0;
  dangerTimer = DANGER_TIME * 60;
  ships = []; balls = []; particles = []; splashes = []; smokes = [];
  shipSpawnCD = 80; shipSpawnInterval = 160; shipSpeed = 1.0;
  updateScoreHUD();
  document.getElementById('dbar').style.width = '0%';
  document.getElementById('rbar').style.width = '100%';
  const board = getBoard();
  document.getElementById('hsv').textContent = board.length ? board[0].pts : 0;
}

function updateScoreHUD() {
  document.getElementById('sv').textContent = score;
}

let frameId;
function loop() {
  frameId = requestAnimationFrame(loop);
  if (!gameRunning) return;
  t++;

  // ── DRAW WORLD ──
  drawWater();

  // ── SPAWN SHIPS ──
  shipSpawnCD--;
  if (shipSpawnCD <= 0) {
    ships.push(spawnShip());
    shipSpawnInterval = Math.max(55, shipSpawnInterval * 0.97);
    shipSpawnCD = shipSpawnInterval | 0;
  }

  // ── RELOAD ──
  if (!canFire) {
    reloadCD--;
    document.getElementById('rbar').style.width = ((1 - reloadCD / RELOAD_TIME) * 100) + '%';
    if (reloadCD <= 0) { canFire = true; document.getElementById('rbar').style.width = '100%'; }
  }

  // ── DANGER TIMER ──
  dangerTimer--;
  const dangerPct = 1 - dangerTimer / (DANGER_TIME * 60);
  document.getElementById('dbar').style.width = (dangerPct * 100) + '%';
  document.getElementById('dbar').style.background =
    dangerPct < 0.5 ? 'linear-gradient(90deg,#FFD700,#FFA000)'
    : dangerPct < 0.8 ? 'linear-gradient(90deg,#FFA000,#FF5252)'
    : 'linear-gradient(90deg,#FF5252,#D50000)';
  if (dangerTimer <= 0) { endGame(); return; }

  // ── UPDATE & DRAW SHIPS ──
  ships = ships.filter(s => {
    // move
    if (!s.sinking) {
      s.x += s.vx;
      if (s.hitFlash > 0) s.hitFlash--;
    } else {
      s.sinkTimer++;
      s.y += 1.5;
      s.x += s.vx * 0.3;
    }

    // off screen
    if (s.x > W + 120 || s.x < -120) return false;
    if (s.sinkTimer > 50) return false;

    // draw ship
    ctx.save();
    if (s.hitFlash > 0 && Math.floor(t / 3) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    if (s.sinking) {
      ctx.globalAlpha = Math.max(0, 1 - s.sinkTimer / 50);
      ctx.translate(s.x, s.y);
      ctx.rotate(s.vx > 0 ? s.sinkTimer * 0.04 : -s.sinkTimer * 0.04);
      em(s.emoji, 0, 0, s.w);
    } else {
      em(s.emoji, s.x, s.y, s.w);
      // HP dots
      for (let i = 0; i < s.maxHp; i++) {
        ctx.fillStyle = i < s.hp ? '#FF5252' : 'rgba(255,255,255,.2)';
        ctx.beginPath();
        ctx.arc(s.x - (s.maxHp - 1) * 6 + i * 12, s.y + s.h / 2 + 10, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
    return true;
  });

  // ── UPDATE & DRAW BALLS ──
  balls = balls.filter(b => {
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.shift();
    b.x += b.vx; b.y += b.vy;

    // off screen
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) return false;

    // draw trail
    b.trail.forEach((tp, ti) => {
      ctx.globalAlpha = (ti / b.trail.length) * 0.4;
      ctx.fillStyle = '#FF8F00';
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, b.r * (ti / b.trail.length) * 0.7, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // ball
    ctx.save();
    ctx.shadowColor = '#FF8F00'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#212121';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#424242';
    ctx.beginPath(); ctx.arc(b.x - 3, b.y - 3, b.r * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // collision with ships
    let hit = false;
    ships.forEach(s => {
      if (s.sinking) return;
      if (Math.abs(b.x - s.x) < s.w * 0.55 && Math.abs(b.y - s.y) < s.h * 0.55) {
        s.hp--;
        s.hitFlash = 18;
        burst(b.x, b.y, ['💥','🔥','💢'], 6, 3);
        hit = true;
        if (s.hp <= 0) {
          s.sinking = true;
          score += s.pts;
          updateScoreHUD();
          dangerTimer = DANGER_TIME * 60; // reset danger on hit!
          burst(s.x, s.y, ['💥','🌊','💦','⭐'], 12, 5);
          // splash
          splashes.push({ x: s.x, y: s.y, life: 30, maxLife: 30 });
          // score popup via particle
          particles.push({
            x: s.x, y: s.y - 30, vx: 0, vy: -1.2,
            e: `+${s.pts}`, life: 45, maxLife: 45, size: 24, isText: true, color: '#FFD700'
          });
        }
      }
    });
    return !hit;
  });

  // ── SMOKE ──
  smokes = smokes.filter(s => {
    s.x += s.vx; s.y += s.vy; s.life--;
    ctx.globalAlpha = (s.life / s.maxLife) * 0.45;
    ctx.fillStyle = '#9E9E9E';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * (1 - s.life / s.maxLife * 0.3), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return s.life > 0;
  });

  // ── SPLASHES ──
  splashes = splashes.filter(s => {
    s.life--;
    const prog = 1 - s.life / s.maxLife;
    ctx.globalAlpha = s.life / s.maxLife;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const d = prog * 40;
      em('💧', s.x + Math.cos(a) * d, s.y + Math.sin(a) * d, 14);
    }
    ctx.globalAlpha = 1;
    return s.life > 0;
  });

  // ── PARTICLES ──
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    ctx.globalAlpha = p.life / p.maxLife;
    if (p.isText) {
      const f = `900 ${p.size}px 'Helvetica Neue',Arial`;
      if (f !== _efont) { ctx.font = f; _efont = f; }
      ctx.fillStyle = p.color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.e, p.x, p.y);
    } else {
      em(p.e, p.x, p.y, p.size);
    }
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  // ── PIRATE & CANNON (drawn on top) ──
  drawPirate();

  // ── AIM HINT when idle ──
  if (!aiming && gameRunning && t % 80 < 40) {
    const f = '700 0.75rem Arial';
    if (f !== _efont) { ctx.font = f; _efont = f; }
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👆 Arrasta para apontar', W / 2, PIRATE_Y - 70);
  }
}

// ─── END ───────────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  aiming = false;
  const board = saveScore(score);
  document.getElementById('go-score').textContent = score + ' pontos';
  const best = board[0]?.pts || 0;
  document.getElementById('go-msg').textContent =
    score >= best && board.length > 0
      ? '🏆 Novo recorde! Lendário!'
      : score >= 25 ? '⚓ Excelente capitão!'
      : score >= 10 ? '🏴‍☠️ Bom trabalho! Continua!'
      : '💀 Os barcos escaparam todos!';
  renderLB('lb2', score);
  document.getElementById('hsv').textContent = best;
  document.getElementById('gs').classList.remove('off');
}

// ─── INIT ──────────────────────────────────────────────────
renderLB('lb');
frameId = requestAnimationFrame(loop);
gameRunning = false;

if ('serviceWorker' in navigator) {
  const sw = `const C='piratas-v1';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'text/javascript' })));
}
</script>
