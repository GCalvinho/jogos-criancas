<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Princesa">
<meta name="theme-color" content="#9C27B0">
<title>👸 Fuga da Princesa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0020;touch-action:none;user-select:none;}
#c{position:fixed;inset:0;width:100%;height:100%;touch-action:none;}

#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  padding-top:calc(8px + env(safe-area-inset-top,0px));
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(6px);
  pointer-events:none;
}
#score-hud{
  background:linear-gradient(135deg,#9C27B0,#6A1B9A);
  color:#fff;border-radius:50px;padding:5px 14px;
  font:900 1.3rem/1 'Helvetica Neue',Arial;
  white-space:nowrap;
}
#lives-hud{font-size:1.4rem;letter-spacing:1px;white-space:nowrap;}
#hs-hud{font:700 .85rem/1 Arial;color:rgba(255,255,255,.6);margin-left:auto;white-space:nowrap;}
#power-wrap{flex:1;display:none;flex-direction:column;align-items:center;gap:2px;}
#power-wrap.show{display:flex;}
#power-lbl{font:700 .7rem/1 Arial;color:#FFD700;letter-spacing:1px;}
#pbar-bg{width:90px;height:8px;background:rgba(255,255,255,.2);border-radius:6px;overflow:hidden;}
#pbar{height:100%;width:100%;background:linear-gradient(90deg,#FFD700,#FF9800);border-radius:6px;}

.screen{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:radial-gradient(ellipse at 50% 40%,rgba(74,0,114,.97),rgba(5,0,20,.99));
  transition:opacity .3s;
}
.screen.off{opacity:0;pointer-events:none;}
.s-emoji{font-size:5rem;line-height:1;}
.s-title{font:900 2.2rem/1 'Helvetica Neue',Arial;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.5);text-align:center;}
.s-sub{font:400 .95rem/1.5 Arial;color:rgba(255,255,255,.75);text-align:center;max-width:280px;}
.big-btn{
  background:linear-gradient(135deg,#FFD700,#FFA000);
  border:none;border-radius:50px;padding:14px 36px;
  font:900 1.7rem/1 'Helvetica Neue',Arial;color:#3E1A00;cursor:pointer;
  box-shadow:0 5px 0 #E65100;transition:transform .1s,box-shadow .1s;
}
.big-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #E65100;}

#lb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:10px 18px;width:min(300px,86vw);}
.lb-t{font:700 .8rem/1 Arial;color:#FFD700;margin-bottom:8px;text-align:center;letter-spacing:2px;}
.lb-r{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.07);font:600 .95rem/1 Arial;color:#fff;}
.lb-r:last-child{border:none;}
.lb-m{width:24px;text-align:center;font-size:1.1rem;}
.lb-d{flex:1;color:rgba(255,255,255,.7);font-size:.85rem;}
.lb-p{color:#FFD700;font-weight:900;}
.lb-r.hi{background:rgba(255,215,0,.08);border-radius:6px;}
#lb2{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:10px 18px;width:min(300px,86vw);}
#go-score{font:900 2.8rem/1 'Helvetica Neue',Arial;color:#FFD700;}
#go-msg{font:400 1rem/1.4 Arial;color:#C8E6C9;text-align:center;max-width:260px;}
</style>
</head>
<body>

<div id="hud">
  <div id="score-hud">⭐ <span id="sv">0</span></div>
  <div id="lives-hud">❤️❤️❤️</div>
  <div id="power-wrap">
    <div id="power-lbl">✨ MAGIA</div>
    <div id="pbar-bg"><div id="pbar"></div></div>
  </div>
  <div id="hs-hud">🏆 <span id="hsv">0</span></div>
</div>

<canvas id="c"></canvas>

<!-- START -->
<div class="screen" id="ss">
  <div class="s-emoji">👸</div>
  <div class="s-title">Fuga da Princesa</div>
  <div class="s-sub">Toca na princesa e arrasta para fugir dos dragões!<br><br>
    💎 Jóias = pontos &nbsp;·&nbsp; ✨ Varinha = come dragões!</div>
  <button class="big-btn" onclick="startGame()">▶️ Jogar</button>
  <div id="lb"></div>
</div>

<!-- GAME OVER -->
<div class="screen off" id="gs">
  <div class="s-emoji">😭</div>
  <div class="s-title">O dragão apanhou-te!</div>
  <div id="go-score">0 pts</div>
  <div id="go-msg"></div>
  <button class="big-btn" onclick="startGame()">🔄 Outra vez</button>
  <div id="lb2"></div>
</div>

<script>
// ─── CANVAS ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
}
window.addEventListener('resize', () => { resize(); });
resize();

// ─── LEADERBOARD ───────────────────────────────────────────
const LB_KEY = 'pfuga_v2';
function getBoard() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; } }
function saveScore(pts) {
  let b = getBoard();
  b.push({ pts, d: new Date().toLocaleDateString('pt-PT') });
  b.sort((a, b) => b.pts - a.pts);
  b = b.slice(0, 5);
  localStorage.setItem(LB_KEY, JSON.stringify(b));
  return b;
}
function renderLB(id, hi = -1) {
  const b = getBoard();
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  document.getElementById(id).innerHTML =
    `<div class="lb-t">🏆 MELHORES</div>` +
    (b.length === 0
      ? `<div style="text-align:center;color:rgba(255,255,255,.35);font-size:.85rem;padding:6px">Ainda sem recordes</div>`
      : b.map((r, i) => `<div class="lb-r ${r.pts===hi&&i===0?'hi':''}">
          <span class="lb-m">${medals[i]}</span>
          <span class="lb-d">${r.d}</span>
          <span class="lb-p">${r.pts} pts</span>
         </div>`).join(''));
}

// ─── EMOJI DRAWING ─────────────────────────────────────────
// Cache font sizes to avoid re-setting every frame
let lastEmojiSize = 0;
function emoji(e, x, y, size) {
  if (size !== lastEmojiSize) {
    ctx.font = `${size}px serif`;
    lastEmojiSize = size;
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(e, x, y);
}

// ─── STARS BACKGROUND (precomputed) ────────────────────────
const STARS = Array.from({length:60}, () => ({
  x: Math.random(), y: Math.random(),
  s: 0.5 + Math.random() * 1.5,
  p: Math.random() * Math.PI * 2
}));

function drawBg(t) {
  // gradient sky
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#050010');
  g.addColorStop(1, '#1a004a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // stars
  STARS.forEach(s => {
    const a = 0.3 + 0.7 * Math.abs(Math.sin(t * 0.001 + s.p));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── PARTICLES ─────────────────────────────────────────────
let particles = [];
function burst(x, y, emojis, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.5;
    const spd = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      e: emojis[Math.floor(Math.random() * emojis.length)],
      life: 35 + Math.random() * 20 | 0,
      maxLife: 55,
      size: 18 + Math.random() * 10 | 0
    });
  }
}

// ─── GAME STATE ────────────────────────────────────────────
let princess, dragons, jewels, wands;
let score, lives, powered, powerTimer;
let hurtCD = 0;
let spawnInterval, spawnCD, dragonSpeed;
let gameRunning = false;
let frameId;
let t = 0;

// input — direct position, no lag
let touching = false;
let touchX = 0, touchY = 0;
let grabbedPrincess = false;

// ─── INPUT ─────────────────────────────────────────────────
function getXY(e) {
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX, y: src.clientY };
}
function tryGrab(x, y) {
  if (!gameRunning) return;
  const d = Math.hypot(x - princess.x, y - princess.y);
  if (d < princess.r * 3) { grabbedPrincess = true; }
}
function onDown(e) { e.preventDefault(); const p = getXY(e); touchX = p.x; touchY = p.y; touching = true; tryGrab(p.x, p.y); }
function onMove(e) { e.preventDefault(); if (!touching) return; const p = getXY(e); touchX = p.x; touchY = p.y; }
function onUp(e)   { e.preventDefault(); touching = false; grabbedPrincess = false; }

canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });
canvas.addEventListener('touchcancel',onUp,   { passive: false });
canvas.addEventListener('mousedown',  onDown, { passive: false });
canvas.addEventListener('mousemove',  onMove, { passive: false });
canvas.addEventListener('mouseup',    onUp,   { passive: false });

// ─── SPAWN HELPERS ─────────────────────────────────────────
function edgePos() {
  const side = Math.random() * 4 | 0;
  if (side === 0) return { x: Math.random() * W, y: -50 };
  if (side === 1) return { x: W + 50, y: Math.random() * H };
  if (side === 2) return { x: Math.random() * W, y: H + 50 };
  return { x: -50, y: Math.random() * H };
}
function rndPos(margin = 80) {
  return { x: margin + Math.random() * (W - margin * 2), y: margin + Math.random() * (H - margin * 2) };
}

// ─── START ─────────────────────────────────────────────────
function startGame() {
  document.getElementById('ss').classList.add('off');
  document.getElementById('gs').classList.add('off');

  score = 0; lives = 3; powered = false; powerTimer = 0;
  hurtCD = 0; t = 0; particles = [];
  spawnInterval = 280; spawnCD = 100; dragonSpeed = 1.4;

  princess = { x: W / 2, y: H / 2, r: 28 };
  dragons  = [{ ...edgePos(), r: 26, vx: 0, vy: 0 }];
  jewels   = Array.from({ length: 6 }, () => ({ ...rndPos(), r: 18, ei: Math.random() * 5 | 0 }));
  wands    = [{ ...rndPos(100), r: 20 }];

  updateHUD();
  document.getElementById('power-wrap').classList.remove('show');
  const board = getBoard();
  document.getElementById('hsv').textContent = board.length ? board[0].pts : 0;

  gameRunning = true;
  if (!frameId) frameId = requestAnimationFrame(loop);
}

// ─── HUD ───────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('sv').textContent = score;
  document.getElementById('lives-hud').textContent = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
}

// ─── MAIN LOOP ─────────────────────────────────────────────
function loop() {
  frameId = requestAnimationFrame(loop);
  if (!gameRunning) return;
  t++;

  // ── BG ──
  drawBg(t);

  // ── PRINCESS MOVEMENT — teleport to finger, no lag ──
  if (grabbedPrincess && touching) {
    // Snap directly to finger with tiny smoothing just to avoid jitter
    princess.x += (touchX - princess.x) * 0.7;
    princess.y += (touchY - princess.y) * 0.7;
  }
  // clamp
  const hudH = 56 + (window.screen?.height ? 0 : 0);
  princess.x = Math.max(princess.r, Math.min(W - princess.r, princess.x));
  princess.y = Math.max(hudH + princess.r, Math.min(H - princess.r, princess.y));

  // ── SPAWN DRAGONS ──
  spawnCD--;
  if (spawnCD <= 0) {
    dragons.push({ ...edgePos(), r: 26, vx: 0, vy: 0 });
    spawnInterval = Math.max(55, spawnInterval * 0.96);
    spawnCD = spawnInterval | 0;
    dragonSpeed = Math.min(3.2, dragonSpeed + 0.07);
  }

  // ── DRAGON AI ── simple seek, very responsive
  const FLEE_SPEED = dragonSpeed * 1.1;
  dragons.forEach((d, di) => {
    let tx, ty;
    if (powered) {
      // flee away from princess
      const dx = d.x - princess.x, dy = d.y - princess.y;
      const dist = Math.hypot(dx, dy) || 1;
      tx = d.x + dx / dist * 200;
      ty = d.y + dy / dist * 200;
    } else {
      tx = princess.x; ty = princess.y;
    }
    const dx = tx - d.x, dy = ty - d.y;
    const dist = Math.hypot(dx, dy) || 1;
    const spd = powered ? FLEE_SPEED : dragonSpeed;
    // direct velocity — no smoothing lag
    d.vx = (dx / dist) * spd;
    d.vy = (dy / dist) * spd;
    // slight separation
    dragons.forEach((d2, di2) => {
      if (di === di2) return;
      const sdx = d.x - d2.x, sdy = d.y - d2.y;
      const sd = Math.hypot(sdx, sdy);
      if (sd < 55 && sd > 0) { d.vx += sdx / sd * 0.5; d.vy += sdy / sd * 0.5; }
    });
    d.x += d.vx; d.y += d.vy;
  });

  // ── POWER TIMER ──
  if (powered) {
    powerTimer--;
    document.getElementById('pbar').style.width = (powerTimer / 600 * 100) + '%';
    if (powerTimer <= 0) {
      powered = false;
      document.getElementById('power-wrap').classList.remove('show');
    }
  }

  // ── HURT COOLDOWN ──
  if (hurtCD > 0) hurtCD--;

  // ── DRAW JEWELS ──
  const JEWEL_EMOJIS = ['💎','💍','🔮','🌟','✨'];
  jewels.forEach(j => {
    ctx.globalAlpha = 0.9 + 0.1 * Math.sin(t * 0.05 + j.ei);
    emoji(JEWEL_EMOJIS[j.ei], j.x, j.y, 32);
    ctx.globalAlpha = 1;
  });

  // ── DRAW WANDS ──
  wands.forEach(w => {
    const sc = 1 + 0.1 * Math.sin(t * 0.06);
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.scale(sc, sc);
    emoji('🪄', 0, 0, 34);
    // glow ring
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(t * 0.05);
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  });

  // ── DRAW DRAGONS ──
  const DRAGON_E  = powered ? '😱' : '🐉';
  const DRAGON_FIRE = ['🔥','💥'];
  dragons.forEach((d, i) => {
    // shadow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = powered ? '#9C27B0' : '#F44336';
    ctx.beginPath(); ctx.ellipse(d.x, d.y + 22, 20, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // fire when chasing
    if (!powered && t % 12 < 6) {
      emoji(DRAGON_FIRE[i % 2], d.x, d.y - 36, 20);
    }
    emoji(DRAGON_E, d.x, d.y, 46);
    // scared stars when fleeing
    if (powered && Math.floor(t / 8) % 2 === 0) {
      emoji('⭐', d.x + 28 + Math.sin(t * 0.1 + i) * 6, d.y - 30, 16);
    }
  });

  // ── DRAW PRINCESS ──
  const PRINCESS_E = powered ? '🧙‍♀️' : (hurtCD > 0 && Math.floor(t / 6) % 2 === 0 ? '😵' : '👸');
  // shadow
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = powered ? '#FFD700' : '#9C27B0';
  ctx.beginPath(); ctx.ellipse(princess.x, princess.y + 24, 22, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  // glow when powered
  if (powered) {
    ctx.save();
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 24 + Math.sin(t * 0.08) * 8;
    emoji(PRINCESS_E, princess.x, princess.y, 52);
    ctx.restore();
  } else {
    emoji(PRINCESS_E, princess.x, princess.y, 52);
  }
  // grab indicator when not touching
  if (!grabbedPrincess && Math.floor(t / 30) % 2 === 0) {
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(princess.x, princess.y, princess.r * 2.2 + Math.sin(t*0.05)*3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── COLLISIONS: princess vs jewels ──
  jewels = jewels.filter(j => {
    if (Math.hypot(j.x - princess.x, j.y - princess.y) < princess.r + j.r) {
      score++;
      burst(j.x, j.y, ['💫','⭐','✨'], 6);
      updateHUD();
      setTimeout(() => jewels.push({ ...rndPos(), r: 18, ei: Math.random() * 5 | 0 }), 600);
      return false;
    }
    return true;
  });
  while (jewels.length < 5) jewels.push({ ...rndPos(), r: 18, ei: Math.random() * 5 | 0 });

  // ── COLLISIONS: princess vs wands ──
  wands = wands.filter(w => {
    if (Math.hypot(w.x - princess.x, w.y - princess.y) < princess.r + w.r) {
      powered = true; powerTimer = 600;
      document.getElementById('power-wrap').classList.add('show');
      burst(w.x, w.y, ['✨','⭐','💫','🌟'], 12);
      score += 3; updateHUD();
      setTimeout(() => wands.push({ ...rndPos(100), r: 20 }), 14000);
      return false;
    }
    return true;
  });
  if (wands.length === 0 && !powered) wands.push({ ...rndPos(100), r: 20 });

  // ── COLLISIONS: princess vs dragons ──
  dragons = dragons.filter(d => {
    if (Math.hypot(d.x - princess.x, d.y - princess.y) < princess.r + d.r - 4) {
      if (powered) {
        score += 5; updateHUD();
        burst(d.x, d.y, ['💥','🌟','✨'], 10);
        return false;
      } else if (hurtCD === 0) {
        lives--; hurtCD = 80; updateHUD();
        burst(princess.x, princess.y, ['💔','😵','❌'], 6);
        if (lives <= 0) { endGame(); return true; }
      }
    }
    return true;
  });

  // ── PARTICLES ──
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    ctx.globalAlpha = p.life / p.maxLife;
    emoji(p.e, p.x, p.y, p.size);
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  // ── SCORE DISPLAY IN-CANVAS (small, top-centre, backup) ──
  // handled by HUD div
}

// ─── END GAME ──────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  grabbedPrincess = false;
  const board = saveScore(score);
  document.getElementById('go-score').textContent = score + ' pontos';
  const best = board[0]?.pts || 0;
  document.getElementById('go-msg').textContent =
    score >= best
      ? '🏆 Novo recorde! Fantástico!'
      : score >= 30 ? '👸 Incrível! Continua assim!'
      : score >= 15 ? '✨ Muito bem! Quase!'
      : '💪 Treina mais e consegues!';
  renderLB('lb2', score);
  document.getElementById('hsv').textContent = best;
  document.getElementById('gs').classList.remove('off');
}

// ─── INIT ──────────────────────────────────────────────────
renderLB('lb');
frameId = requestAnimationFrame(loop);
gameRunning = false;

if ('serviceWorker' in navigator) {
  const sw = `const C='pfuga-v3';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'text/javascript' })));
}
</script>
</body>
</html>
